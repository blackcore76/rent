<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🏠 월세 관리 · 세대</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<style>
/* 기존 스타일 그대로 유지 (지면 관계상 생략하지 않고 핵심만 포함) */
:root{--bg:#F0F4F8;--card:#fff;--border:#E2E8F0;--text:#1E293B;--sub:#64748B;--hint:#94A3B8;--hdr:#1E2D3D;--hdr2:#2A3F55;--green:#059669;--green-lt:#D1FAE5;--green-t:#065F46;--red:#DC2626;--red-lt:#FEE2E2;--red-t:#991B1B;--blue:#0284C7;--blue-lt:#E0F2FE;--blue-t:#0C4A6E;--indigo:#4F46E5;--indigo-lt:#EEF2FF;--indigo-t:#3730A3;--sky:#0EA5E9;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none}
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:linear-gradient(135deg,var(--hdr),var(--hdr2));box-shadow:0 3px 16px rgba(0,0,0,.25);padding:0 16px}
/* 관리자 알림 바 추가 스타일 */
.admin-mode-bar { background: #f59e0b; color: #000; text-align: center; padding: 4px; font-size: 11px; font-weight: 800; display: none; }
.hdr-top{display:flex;align-items:center;justify-content:space-between;height:52px}
.hdr-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.5px}
.nav{display:flex;border-top:1px solid rgba(255,255,255,.08)}
.nav-tab{flex:1;padding:9px 2px 11px;text-align:center;font-size:11px;font-weight:500;color:rgba(255,255,255,.4);border-bottom:3px solid transparent;text-decoration:none}
.nav-tab.on{color:#fff;border-bottom-color:var(--sky);font-weight:700}
.content{margin-top:100px;padding:14px;min-height:calc(100vh - 100px)}
/* 이하 기존 스타일 동일... (중략) */
.floor-tabs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto}
.floor-tab{padding:7px 16px;border-radius:20px;border:2px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--sub)}
.floor-tab.on{background:var(--hdr);color:#fff;border-color:var(--hdr)}
.rooms-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.room-card{background:var(--card);border-radius:var(--radius);padding:14px 12px;box-shadow:var(--shadow);cursor:pointer;border:2px solid transparent}
.rc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rc-num{font-size:18px;font-weight:900;color:var(--hdr)}
.rc-sbadge{font-size:11px;font-weight:700;padding:3px 7px;border-radius:6px}
.badge-rented{background:var(--blue-lt);color:var(--blue-t)}
.badge-vacant{background:var(--red-lt);color:var(--red-t)}
.rc-names{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.rc-rent{font-size:12px;font-weight:700;color:var(--sub)}
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:flex-end;justify-content:center}
.sheet-bg.show{display:flex}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:540px;max-height:94vh;overflow-y:auto}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.toggle-group{display:flex;border:2px solid var(--border);border-radius:10px;overflow:hidden}
.tg-btn{flex:1;padding:10px;border:none;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--sub)}
.tg-btn.on-blue{background:var(--blue);color:#fff}
.tg-btn.on-gray{background:var(--indigo);color:#fff}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field label{font-size:11px;font-weight:700;color:var(--sub)}
.field input, .field textarea{border:2px solid var(--border);border-radius:10px;padding:10px;font-size:14px;background:#FAFCFF;width:100%}
.btn-save{width:100%;padding:15px;background:var(--hdr);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px}
#loading-overlay{position:fixed;inset:0;background:rgba(30,45,61,.9);z-index:8000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#loading-overlay.hide{display:none}
.spinner{width:44px;height:44px;border:5px solid rgba(255,255,255,.2);border-top-color:#38BDF8;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1F2937;color:#fff;padding:11px 20px;border-radius:24px;font-size:14px;z-index:9999;display:none}
#login-screen{position:fixed;inset:0;background:#1E2D3D;z-index:7000;display:none;align-items:center;justify-content:center}
.google-btn{padding:13px 20px;background:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div id="login-screen">
  <button class="google-btn" onclick="signInGoogle()">Google로 로그인</button>
</div>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-txt">데이터 불러오는 중...</div>
</div>

<div id="app" style="display:none">
  <div class="hdr">
    <div id="admin-banner" class="admin-mode-bar">⚠️ 관리자 모드: <span id="target-uid-display"></span>의 데이터를 수정 중입니다.</div>
    <div class="hdr-top">
      <div class="hdr-title">🏠 세대 관리</div>
      <div class="hdr-actions" id="av-wrap"></div>
    </div>
    <div class="nav">
      <a href="index.html" class="nav-tab">📊 메인</a>
      <a href="units.html" class="nav-tab on">🏠 세대</a>
      <a href="expense.html" class="nav-tab">💸 지출</a>
      <a href="admin.html" class="nav-tab">🗂 관리</a>
    </div>
  </div>

  <div class="content">
    <div class="floor-tabs">
      <button class="floor-tab on" onclick="setFloor(0,this)">전체</button>
      <button class="floor-tab" onclick="setFloor(2,this)">2층</button>
      <button class="floor-tab" onclick="setFloor(3,this)">3층</button>
      <button class="floor-tab" onclick="setFloor(4,this)">4층</button>
    </div>
    <div class="rooms-grid" id="rooms-grid"></div>
  </div>
</div>

<div class="sheet-bg" id="room-sheet">
  <div class="sheet">
    <div class="sheet-hd"><h3 id="sheet-title">— 호</h3><button onclick="closeSheet()">✕</button></div>
    <div class="toggle-group">
      <button class="tg-btn" id="tg-rented" onclick="setStatus('rented')">🏠 임대중</button>
      <button class="tg-btn" id="tg-vacant" onclick="setStatus('vacant')">🔓 공실</button>
    </div>
    <div class="field-row" style="margin-top:15px">
      <div class="field"><label>이름</label><input type="text" id="m-name"></div>
      <div class="field"><label>연락처</label><input type="tel" id="m-phone"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>보증금 (만)</label><input type="number" id="m-deposit"></div>
      <div class="field"><label>월세 (만)</label><input type="number" id="m-rent"></div>
    </div>
    <div class="field"><label>메모</label><textarea id="m-memo" rows="2"></textarea></div>
    <button class="btn-save" onclick="saveRoom()">💾 저장하기</button>
  </div>
</div>

<div id="toast"></div>

<script>
const FC={apiKey:"AIzaSyBHMCPX13coKBA9cu72K4k9WKYQQjVA7IA",authDomain:"rent-4d521.firebaseapp.com",databaseURL:"https://rent-4d521-default-rtdb.firebaseio.com",projectId:"rent-4d521",storageBucket:"rent-4d521.firebasestorage.app",messagingSenderId:"922087443394",appId:"1:922087443394:web:ff78188fc5ab967287645b"};
firebase.initializeApp(FC);
const db=firebase.database(),auth=firebase.auth(),storage=firebase.storage(),gProv=new firebase.auth.GoogleAuthProvider();

let cu=null, activeUid=null, uRef=null, hRef=null, units={}, rentHistory={}, curFloor=0, curRoom=null, mStatus="vacant";
const ROOMS=[201,202,203,204,205,206,301,302,303,304,305,306,401,402,403,404,405,406];
const ADMIN_UID = "unGRVYWhmcMmEbYbWjAL8Y1pXVP2";

auth.onAuthStateChanged(user=>{
  const lo=document.getElementById("loading-overlay");
  const ls=document.getElementById("login-screen");
  const app=document.getElementById("app");

  if(user){
    cu=user;
    const params = new URLSearchParams(location.search);
    const targetUid = params.get('targetUid');

    // ★ 핵심: 관리자이고 targetUid가 있으면 activeUid를 targetUid로 설정
    if(user.uid === ADMIN_UID && targetUid) {
        activeUid = targetUid;
        document.getElementById('admin-banner').style.display = 'block';
        document.getElementById('target-uid-display').textContent = targetUid;
    } else {
        activeUid = user.uid;
        document.getElementById('admin-banner').style.display = 'none';
    }

    uRef=db.ref(`rent_app/${activeUid}/units`);
    hRef=db.ref(`rent_app/${activeUid}/rent_history`);

    lo.classList.add("hide"); ls.style.display="none"; app.style.display="block";
    listenUnits();
  }else{
    ls.style.display="flex"; app.style.display="none";
  }
});

function listenUnits(){
  uRef.on("value",snap=>{
    const val=snap.val()||{};
    ensureRooms(val);
    units=val;
    renderGrid();
  });
}

async function ensureRooms(ex){
  const up={};
  let needsUpdate = false;
  ROOMS.forEach(r=>{
    if(!ex[r]) {
        up[r]= {room:String(r), floor:Math.floor(r/100), status:"vacant", tenantName:"", tenantPhone:"", depositAmount:0, monthlyRent:0};
        needsUpdate = true;
    }
  });
  if(needsUpdate) await uRef.update(up);
}

function renderGrid(){
  const list=ROOMS.map(r=>units[r]).filter(u=>u&&(curFloor===0||u.floor===curFloor));
  document.getElementById("rooms-grid").innerHTML=list.map(u=>{
    const isR=u.status==="rented";
    return `<div class="room-card" onclick="openSheet('${u.room}')">
      <div class="rc-top"><span class="rc-num">${u.room}호</span>
      <span class="rc-sbadge ${isR?"badge-rented":"badge-vacant"}">${isR?"임대중":"공실"}</span></div>
      <div class="rc-names">${u.tenantName||"공실"}</div>
      <div class="rc-rent">${isR? (u.monthlyRent||0).toLocaleString() + "만/월" : "—"}</div>
    </div>`;
  }).join("");
}

function openSheet(roomId){
  curRoom=roomId;
  const u=units[roomId];
  document.getElementById("sheet-title").textContent=`${roomId}호`;
  document.getElementById("m-name").value=u.tenantName||"";
  document.getElementById("m-phone").value=u.tenantPhone||"";
  document.getElementById("m-deposit").value=u.depositAmount||0;
  document.getElementById("m-rent").value=u.monthlyRent||0;
  document.getElementById("m-memo").value=u.memo||"";
  mStatus=u.status||"vacant";
  updateTgUI();
  document.getElementById("room-sheet").classList.add("show");
}

function saveRoom(){
  const data={
    status: mStatus,
    tenantName: document.getElementById("m-name").value.trim(),
    tenantPhone: document.getElementById("m-phone").value.trim(),
    depositAmount: parseInt(document.getElementById("m-deposit").value)||0,
    monthlyRent: parseInt(document.getElementById("m-rent").value)||0,
    memo: document.getElementById("m-memo").value.trim()
  };
  // 기존 데이터 보존 (사진 등)
  uRef.child(curRoom).update(data).then(()=>{
    closeSheet();
    showToast("✅ 저장되었습니다.");
  });
}

function updateTgUI(){
  document.getElementById("tg-rented").className="tg-btn"+(mStatus==="rented"?" on-blue":"");
  document.getElementById("tg-vacant").className="tg-btn"+(mStatus==="vacant"?" on-gray":"");
}
function setStatus(s){ mStatus=s; updateTgUI(); }
function closeSheet(){ document.getElementById("room-sheet").classList.remove("show"); }
function setFloor(f,btn){
  curFloor=f;
  document.querySelectorAll(".floor-tab").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on"); renderGrid();
}
function signInGoogle(){ auth.signInWithPopup(gProv); }
function showToast(m){
    const t=document.getElementById("toast"); t.textContent=m; t.style.display="block";
    setTimeout(()=>t.style.display="none", 2000);
}
</script>
</body>
</html>
