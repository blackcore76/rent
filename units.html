<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1E2D3D">
<title>🏠 월세 관리 · 세대</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<style>
:root{
  --bg:#F0F4F8;--card:#fff;--border:#E2E8F0;
  --text:#1E293B;--sub:#64748B;--hint:#94A3B8;
  --hdr:#1E2D3D;--hdr2:#2A3F55;
  --green:#059669;--green-lt:#D1FAE5;--green-t:#065F46;
  --red:#DC2626;--red-lt:#FEE2E2;--red-t:#991B1B;
  --blue:#0284C7;--blue-lt:#E0F2FE;--blue-t:#0C4A6E;
  --indigo:#4F46E5;--indigo-lt:#EEF2FF;--indigo-t:#3730A3;
  --amber:#D97706;--amber-lt:#FEF3C7;--amber-t:#92400E;
  --sky:#0EA5E9;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08)
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Noto Sans KR',system-ui,sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none}
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;
  background:linear-gradient(135deg,var(--hdr) 0%,var(--hdr2) 100%);
  box-shadow:0 3px 16px rgba(0,0,0,.25);padding:0 16px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;height:52px}
.hdr-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.5px}
.hdr-actions{display:flex;align-items:center;gap:8px;position:relative}
.user-avatar{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.4);cursor:pointer;object-fit:cover}
.user-avatar-fallback{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.4);background:var(--sky);color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav{display:flex;border-top:1px solid rgba(255,255,255,.08)}
.nav-tab{flex:1;padding:9px 4px 11px;text-align:center;font-size:12px;font-weight:500;color:rgba(255,255,255,.4);border-bottom:3px solid transparent;cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap}
.nav-tab.on{color:#fff;border-bottom-color:var(--sky);font-weight:700}
.user-menu{position:fixed;top:56px;right:12px;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.2);padding:16px;min-width:210px;z-index:300;display:none;border:1px solid var(--border)}
.user-menu.show{display:block}
.um-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.um-email{font-size:12px;color:var(--hint);margin-bottom:12px;word-break:break-all}
.logout-btn{width:100%;padding:9px;background:var(--red-lt);color:var(--red);border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.content{margin-top:96px;padding:14px;min-height:calc(100vh - 96px)}
/* Floor tabs */
.floor-tabs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.floor-tab{padding:7px 16px;border-radius:20px;border:2px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--sub);font-family:inherit;white-space:nowrap;transition:all .15s;flex-shrink:0}
.floor-tab.on{background:var(--hdr);color:#fff;border-color:var(--hdr)}
/* Room grid */
.rooms-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:600px){.rooms-grid{grid-template-columns:repeat(3,1fr)}}
.room-card{background:var(--card);border-radius:var(--radius);padding:14px 12px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,box-shadow .15s;border:2px solid transparent}
.room-card:active{transform:scale(.97);box-shadow:0 1px 6px rgba(0,0,0,.1)}
.room-card.status-vacant{border-color:var(--indigo-lt)}
.room-card.status-rented{border-color:var(--blue-lt)}
.rc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rc-num{font-size:18px;font-weight:900;color:var(--hdr)}
.rc-status{font-size:11px;font-weight:700;padding:3px 7px;border-radius:6px}
.rc-tenant{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rc-rent{font-size:12px;color:var(--sub);margin-bottom:6px}
.rc-paid{font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block}
/* Badges */
.badge-rented{background:var(--blue-lt);color:var(--blue-t)}
.badge-vacant{background:var(--indigo-lt);color:var(--indigo-t)}
.badge-paid{background:var(--green-lt);color:var(--green-t)}
.badge-unpaid{background:var(--red-lt);color:var(--red-t)}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-width:520px;
  box-shadow:0 -4px 32px rgba(0,0,0,.2);max-height:92vh;overflow-y:auto}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-hd h3{font-size:17px;font-weight:900;color:var(--hdr)}
.modal-close{width:32px;height:32px;border:none;background:#F3F4F6;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* Toggle group */
.toggle-group{display:flex;gap:0;border:2px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:4px}
.tg-btn{flex:1;padding:10px 8px;border:none;background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--sub);transition:all .15s}
.tg-btn.on{background:var(--hdr);color:#fff}
.tg-btn.on.green{background:var(--green)}
.tg-btn.on.red{background:var(--red)}
.tg-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:14px}
/* Fields */
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:0}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.field input,.field textarea,.field select{border:2px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;color:var(--text);background:#FAFCFF;width:100%;transition:border-color .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--sky);background:#fff}
.field textarea{resize:none}
.btn-save{width:100%;padding:15px;background:var(--hdr);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:opacity .15s}
.btn-save:active{opacity:.85}
.divider{height:1px;background:var(--border);margin:16px 0}
/* Photos */
.photo-section{}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:#F0F4F8}
.photo-thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer}
.photo-del{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.upload-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;border:2px dashed var(--border);border-radius:10px;background:#FAFCFF;color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.upload-btn:hover{border-color:var(--sky);color:var(--sky)}
.upload-btn:disabled{opacity:.5;cursor:not-allowed}
.progress-bar{height:4px;border-radius:2px;background:#E2E8F0;margin-top:8px;overflow:hidden;display:none}
.progress-fill{height:100%;background:var(--sky);transition:width .3s;width:0%}
/* Photo viewer overlay */
#photo-viewer{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:900;display:none;align-items:center;justify-content:center}
#photo-viewer.show{display:flex}
#photo-viewer img{max-width:95%;max-height:90vh;border-radius:8px;object-fit:contain}
#photo-viewer-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* Toast / Loading / Login */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1F2937;color:#fff;padding:11px 20px;border-radius:24px;font-size:14px;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3);pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#loading-overlay{position:fixed;inset:0;background:rgba(30,45,61,.82);z-index:8000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .3s}
#loading-overlay.hide{opacity:0;pointer-events:none}
.spinner{width:44px;height:44px;border:5px solid rgba(255,255,255,.2);border-top-color:#38BDF8;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:#fff;font-size:13px;font-weight:600}
#login-screen{position:fixed;inset:0;background:linear-gradient(160deg,#0F1C2D 0%,#1E2D3D 50%,#2A3F55 100%);z-index:7000;display:flex;align-items:center;justify-content:center;padding:20px;transition:opacity .4s}
#login-screen.hide{opacity:0;pointer-events:none}
.login-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:36px 28px;max-width:320px;width:100%;text-align:center;backdrop-filter:blur(16px);box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo{font-size:52px;margin-bottom:14px;line-height:1}
.login-title{font-size:22px;font-weight:900;color:#fff;margin-bottom:6px;letter-spacing:-.5px}
.login-sub{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:28px;line-height:1.7}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 20px;background:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;color:#1F2937;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:all .2s}
.google-btn:active{transform:scale(.98)}
.google-icon{width:18px;height:18px;flex-shrink:0}
.login-footer{font-size:10px;color:rgba(255,255,255,.25);margin-top:18px;line-height:1.7}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🏠</div>
    <div class="login-title">월세 관리</div>
    <div class="login-sub">임대 현황을 한눈에 관리하세요<br>Google 계정으로 안전하게 로그인</div>
    <button class="google-btn" onclick="signInGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 로그인
    </button>
    <div class="login-footer">데이터는 본인 Google 계정에만 저장됩니다</div>
  </div>
</div>

<div id="loading-overlay" class="hide">
  <div class="spinner"></div>
  <div class="loading-txt">세대 정보 로딩 중...</div>
</div>

<div id="app" style="visibility:hidden">
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-title">🏠 세대 관리</div>
      <div class="hdr-actions">
        <div id="avatar-wrap" style="display:none" onclick="toggleUserMenu()"></div>
      </div>
    </div>
    <div class="nav">
      <a href="index.html" class="nav-tab">📊 메인</a>
      <a href="units.html" class="nav-tab on">🏠 세대</a>
      <a href="management.html" class="nav-tab">💰 관리</a>
    </div>
  </div>
  <div id="user-menu" class="user-menu">
    <div class="um-name" id="um-name">—</div>
    <div class="um-email" id="um-email">—</div>
    <button class="logout-btn" onclick="doSignOut()">🚪 로그아웃</button>
  </div>

  <div class="content">
    <div class="floor-tabs">
      <button class="floor-tab on" onclick="setFloor(0,this)">전체</button>
      <button class="floor-tab" onclick="setFloor(2,this)">2층</button>
      <button class="floor-tab" onclick="setFloor(3,this)">3층</button>
      <button class="floor-tab" onclick="setFloor(4,this)">4층</button>
    </div>
    <div class="rooms-grid" id="rooms-grid"></div>
  </div>
</div>

<!-- ROOM EDIT MODAL (bottom sheet) -->
<div class="modal-bg" id="room-modal">
  <div class="modal">
    <div class="modal-hd">
      <h3 id="modal-room-title">— 호</h3>
      <button class="modal-close" onclick="closeRoomModal()">✕</button>
    </div>
    <input type="hidden" id="m-room">

    <!-- 임대 상태 -->
    <div class="tg-label">임대 상태</div>
    <div class="toggle-group">
      <button class="tg-btn on" id="tg-rented" onclick="setStatus('rented')">🏠 임대중</button>
      <button class="tg-btn" id="tg-vacant" onclick="setStatus('vacant')">🔓 공실</button>
    </div>

    <!-- 납부 상태 -->
    <div class="tg-label">이달 납부 상태</div>
    <div class="toggle-group">
      <button class="tg-btn on green" id="tg-paid" onclick="setRentPaid(true)">✅ 완납</button>
      <button class="tg-btn" id="tg-unpaid" onclick="setRentPaid(false)">❌ 미납</button>
    </div>

    <div class="divider"></div>

    <!-- 임차인 정보 -->
    <div class="tg-label">임차인 정보</div>
    <div class="field-row">
      <div class="field">
        <label>임차인 이름</label>
        <input type="text" id="m-name" placeholder="홍길동">
      </div>
      <div class="field">
        <label>연락처</label>
        <input type="tel" id="m-phone" placeholder="010-0000-0000">
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>보증금 (만원)</label>
        <input type="number" id="m-deposit" placeholder="0">
      </div>
      <div class="field">
        <label>월세 (만원)</label>
        <input type="number" id="m-rent" placeholder="0">
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>계약 시작일</label>
        <input type="date" id="m-start">
      </div>
      <div class="field">
        <label>계약 종료일</label>
        <input type="date" id="m-end">
      </div>
    </div>

    <div class="field">
      <label>특이사항 메모</label>
      <textarea id="m-memo" rows="2" placeholder="수리 요청, 계약 관련 특이사항 등..."></textarea>
    </div>

    <div class="divider"></div>

    <!-- 계약서 사진 -->
    <div class="tg-label">📷 계약서 사진</div>
    <div class="photo-grid" id="photo-grid"></div>
    <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="onPhotoSelected(event)">
    <button class="upload-btn" id="upload-btn" onclick="document.getElementById('photo-input').click()">
      📷 사진 추가 (계약서, 신분증 등)
    </button>
    <div class="progress-bar" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="divider"></div>
    <button class="btn-save" onclick="saveRoom()">💾 저장</button>
  </div>
</div>

<!-- PHOTO VIEWER -->
<div id="photo-viewer">
  <button id="photo-viewer-close" onclick="closeViewer()">✕</button>
  <img id="viewer-img" src="" alt="">
</div>

<!-- CONFIRM MODAL -->
<div class="modal-bg" id="confirm-modal" style="z-index:600">
  <div class="modal" style="border-radius:20px;max-width:360px">
    <h3 id="confirm-title" style="font-size:16px;font-weight:700;margin-bottom:12px;color:var(--hdr)">확인</h3>
    <p id="confirm-msg" style="font-size:13px;color:var(--sub);margin-bottom:16px;line-height:1.6"></p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button style="padding:10px 20px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#F3F4F6;color:var(--sub)" onclick="closeConfirm()">취소</button>
      <button style="padding:10px 20px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:var(--red-lt);color:var(--red)" id="confirm-ok">삭제</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const FC={apiKey:"AIzaSyBHMCPX13coKBA9cu72K4k9WKYQQjVA7IA",authDomain:"rent-4d521.firebaseapp.com",databaseURL:"https://rent-4d521-default-rtdb.firebaseio.com",projectId:"rent-4d521",storageBucket:"rent-4d521.firebasestorage.app",messagingSenderId:"922087443394",appId:"1:922087443394:web:ff78188fc5ab967287645b"};
firebase.initializeApp(FC);
const db=firebase.database(),auth=firebase.auth(),storage=firebase.storage(),gProv=new firebase.auth.GoogleAuthProvider();
let cu=null,uRef=null,uL=null,units={};
let curFloor=0,curRoomId=null;
const ROOMS=[201,202,203,204,205,206,301,302,303,304,305,306,401,402,403,404,405,406];

auth.onAuthStateChanged(user=>{
  if(user){
    cu=user;
    document.getElementById("app").style.visibility="visible";
    document.getElementById("login-screen").classList.add("hide");
    const w=document.getElementById("avatar-wrap");
    w.innerHTML=user.photoURL?`<img class="user-avatar" src="${user.photoURL}">`:`<div class="user-avatar-fallback">${(user.displayName||"U")[0]}</div>`;
    w.style.display="block";
    document.getElementById("um-name").textContent=user.displayName||"사용자";
    document.getElementById("um-email").textContent=user.email||"";
    uRef=db.ref(`rent_app/${user.uid}/units`);
    listenUnits();
  }else{
    cu=null;
    document.getElementById("app").style.visibility="hidden";
    document.getElementById("login-screen").classList.remove("hide");
    if(uL&&uRef)uRef.off("value",uL);
  }
});
function signInGoogle(){auth.signInWithPopup(gProv).catch(e=>showToast("❗ "+e.message))}
function doSignOut(){closeUserMenu();auth.signOut()}
function toggleUserMenu(){document.getElementById("user-menu").classList.toggle("show")}
function closeUserMenu(){document.getElementById("user-menu").classList.remove("show")}
document.addEventListener("click",e=>{if(!e.target.closest("#avatar-wrap")&&!e.target.closest("#user-menu"))closeUserMenu()});

function listenUnits(){
  showLoad(true);
  uL=uRef.on("value",snap=>{
    const val=snap.val()||{};
    ensureRooms(val);
    units=val;renderGrid();showLoad(false);
  },()=>{showLoad(false);showToast("❗ 연결 오류")});
}
async function ensureRooms(ex){
  const up={};ROOMS.forEach(r=>{if(!ex[r])up[r]=defRoom(r)});
  if(Object.keys(up).length)await uRef.update(up);
}
function defRoom(n){return{room:String(n),floor:Math.floor(n/100),status:"vacant",tenantName:"",tenantPhone:"",depositAmount:0,monthlyRent:0,contractStart:"",contractEnd:"",rentPaid:false,memo:""}}

function setFloor(f,btn){
  curFloor=f;
  document.querySelectorAll(".floor-tab").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");renderGrid();
}
function renderGrid(){
  const list=ROOMS.map(r=>units[r]).filter(u=>u&&(curFloor===0||u.floor===curFloor));
  const el=document.getElementById("rooms-grid");
  el.innerHTML=list.map(u=>{
    const isRented=u.status==="rented";
    const sBadge=isRented?'<span class="rc-status badge-rented">임대중</span>':'<span class="rc-status badge-vacant">공실</span>';
    const pBadge=isRented?(u.rentPaid?'<span class="rc-paid badge-paid">✅ 완납</span>':'<span class="rc-paid badge-unpaid">❌ 미납</span>'):'';
    return`<div class="room-card status-${u.status}" onclick="openRoomModal('${u.room}')">
      <div class="rc-top"><span class="rc-num">${u.room}호</span>${sBadge}</div>
      <div class="rc-tenant">${esc(u.tenantName)||"공실"}</div>
      <div class="rc-rent">${isRented?`₩${fmtN(u.monthlyRent)}/월`:"—"}</div>
      ${pBadge}
    </div>`;
  }).join("");
}

// Modal
let mStatus="vacant",mRentPaid=true;

function openRoomModal(roomId){
  const u=units[roomId];if(!u)return;
  curRoomId=roomId;
  document.getElementById("modal-room-title").textContent=`${roomId}호`;
  document.getElementById("m-room").value=roomId;
  mStatus=u.status||"vacant";
  mRentPaid=u.rentPaid!==false;
  document.getElementById("m-name").value=u.tenantName||"";
  document.getElementById("m-phone").value=u.tenantPhone||"";
  document.getElementById("m-deposit").value=u.depositAmount||"";
  document.getElementById("m-rent").value=u.monthlyRent||"";
  document.getElementById("m-start").value=u.contractStart||"";
  document.getElementById("m-end").value=u.contractEnd||"";
  document.getElementById("m-memo").value=u.memo||"";
  updateStatusUI();
  renderPhotos(u.photos||{});
  document.getElementById("room-modal").classList.add("show");
}
function closeRoomModal(){document.getElementById("room-modal").classList.remove("show");curRoomId=null}

function setStatus(s){mStatus=s;updateStatusUI()}
function setRentPaid(v){mRentPaid=v;updateStatusUI()}
function updateStatusUI(){
  document.getElementById("tg-rented").classList.toggle("on",mStatus==="rented");
  document.getElementById("tg-vacant").classList.toggle("on",mStatus==="vacant");
  const paidGroup=document.getElementById("tg-paid").parentElement;
  paidGroup.style.opacity=mStatus==="rented"?"1":"0.4";
  paidGroup.style.pointerEvents=mStatus==="rented"?"":"none";
  document.getElementById("tg-paid").classList.toggle("on",mRentPaid);
  document.getElementById("tg-unpaid").classList.toggle("on",!mRentPaid);
}

function saveRoom(){
  if(!curRoomId)return;
  const data={
    room:curRoomId,floor:Math.floor(parseInt(curRoomId)/100),
    status:mStatus,
    rentPaid:mStatus==="rented"?mRentPaid:false,
    tenantName:document.getElementById("m-name").value.trim(),
    tenantPhone:document.getElementById("m-phone").value.trim(),
    depositAmount:parseInt(document.getElementById("m-deposit").value)||0,
    monthlyRent:parseInt(document.getElementById("m-rent").value)||0,
    contractStart:document.getElementById("m-start").value,
    contractEnd:document.getElementById("m-end").value,
    memo:document.getElementById("m-memo").value.trim()
  };
  // photos는 유지 (덮어쓰지 않음)
  const existing=units[curRoomId]||{};
  if(existing.photos)data.photos=existing.photos;
  uRef.child(curRoomId).update(data)
    .then(()=>{closeRoomModal();showToast("✅ 저장됨");renderGrid()})
    .catch(()=>showToast("❗ 저장 실패"));
}

// Photos
function renderPhotos(photos){
  const list=Object.values(photos||{}).sort((a,b)=>a.id-b.id);
  const el=document.getElementById("photo-grid");
  el.innerHTML=list.map(p=>`
    <div class="photo-thumb">
      <img src="${p.url}" onclick="openViewer('${p.url}')" loading="lazy">
      <button class="photo-del" onclick="deletePhoto('${p.id}','${esc(p.storagePath)}')">✕</button>
    </div>`).join("");
}

async function onPhotoSelected(e){
  const files=Array.from(e.target.files);
  if(!files.length||!curRoomId||!cu)return;
  const btn=document.getElementById("upload-btn");
  const bar=document.getElementById("progress-bar");
  const fill=document.getElementById("progress-fill");
  btn.disabled=true;bar.style.display="block";
  for(let i=0;i<files.length;i++){
    const file=files[i];
    if(!file.type.startsWith("image/")){showToast("❗ 이미지 파일만 가능합니다");continue}
    if(file.size>10*1024*1024){showToast("❗ 10MB 이하 파일만 가능합니다");continue}
    const ts=Date.now();
    const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
    const path=`rent_app/${cu.uid}/contracts/${curRoomId}/${ts}_${safeName}`;
    try{
      const ref=storage.ref(path);
      const task=ref.put(file);
      await new Promise((res,rej)=>{
        task.on("state_changed",snap=>{
          fill.style.width=`${Math.round(snap.bytesTransferred/snap.totalBytes*100)}%`;
        },rej,res);
      });
      const url=await ref.getDownloadURL();
      const photoId=String(ts+(i*10));
      await db.ref(`rent_app/${cu.uid}/units/${curRoomId}/photos/${photoId}`)
        .set({id:photoId,url,storagePath:path,uploadedAt:new Date().toISOString()});
      // 로컬 units 업데이트
      if(!units[curRoomId].photos)units[curRoomId].photos={};
      units[curRoomId].photos[photoId]={id:photoId,url,storagePath:path};
      renderPhotos(units[curRoomId].photos);
      showToast("✅ 사진 업로드 완료");
    }catch(err){showToast("❗ 업로드 실패: "+err.message)}
  }
  btn.disabled=false;bar.style.display="none";fill.style.width="0%";
  e.target.value="";
}

function deletePhoto(photoId,storagePath){
  showConfirm("사진 삭제","이 사진을 삭제하시겠습니까?",async()=>{
    try{
      if(storagePath)await storage.ref(storagePath).delete().catch(()=>{});
      await db.ref(`rent_app/${cu.uid}/units/${curRoomId}/photos/${photoId}`).remove();
      if(units[curRoomId]&&units[curRoomId].photos)delete units[curRoomId].photos[photoId];
      renderPhotos(units[curRoomId]&&units[curRoomId].photos||{});
      showToast("🗑 삭제됨");
    }catch(e){showToast("❗ 삭제 실패")}
  });
}

function openViewer(url){
  document.getElementById("viewer-img").src=url;
  document.getElementById("photo-viewer").classList.add("show");
}
function closeViewer(){
  document.getElementById("photo-viewer").classList.remove("show");
  document.getElementById("viewer-img").src="";
}

function showConfirm(title,msg,cb){
  document.getElementById("confirm-title").textContent=title;
  document.getElementById("confirm-msg").textContent=msg;
  document.getElementById("confirm-ok").onclick=()=>{cb();closeConfirm()};
  document.getElementById("confirm-modal").classList.add("show");
}
function closeConfirm(){document.getElementById("confirm-modal").classList.remove("show")}
function showLoad(on){document.getElementById("loading-overlay").classList.toggle("hide",!on)}
let tTm;
function showToast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(tTm);tTm=setTimeout(()=>t.classList.remove("show"),2800)}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmtN(n){return(n||0).toLocaleString("ko-KR")}
</script>
