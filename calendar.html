<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <title>월세 관리 - 일정</title>
  <style>
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .calendar-nav-btn {
      background: #f1f5f9;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 16px;
      cursor: pointer;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 20px;
    }
    .calendar-weekday {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
    }
    .calendar-day {
      aspect-ratio: 1;
      padding: 8px;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
    }
    .calendar-day:hover { background: #f1f5f9; }
    .calendar-day.today { background: #2563eb; color: white; }
    .calendar-day.has-event { background: #fee2e2; }
    .day-number { font-size: 14px; font-weight: 600; }
    .event-dot {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: #dc2626;
      border-radius: 50%;
    }
    .event-list {
      background: #f8fafc;
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
    }
    .event-item {
      padding: 12px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .event-date {
      min-width: 60px;
      font-size: 12px;
      color: #64748b;
    }
    .event-content {
      flex: 1;
    }
    .event-title {
      font-weight: 600;
      font-size: 14px;
    }
    .event-desc {
      font-size: 12px;
      color: #64748b;
    }
    .event-badge {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
    }
    .event-movein { background: #dcfce7; color: #16a34a; }
    .event-moveout { background: #fee2e2; color: #dc2626; }
    .event-contract { background: #fff3e3; color: #d97706; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <div class="login-box" id="loginBox">
        <div class="login-status" id="loginStatus">
          <span>🔓</span>
          <span>로그인이 필요합니다</span>
        </div>
        <button class="small-login-btn" id="headerLoginBtn">로그인</button>
      </div>
      
      <div class="building-input-wrapper">
        <span class="building-icon">🏣</span>
        <input type="text" id="buildingName" class="building-name" value="조아빌" maxlength="10" disabled>
      </div>
      <div class="top-controls">
        <select id="monthPicker" class="month-picker"></select>
        <button class="memo-btn" id="memoBtn" disabled>📝 메모</button>
      </div>
    </div>
    
    <!-- 캘린더 컨테이너 -->
    <div id="calendarContainer" style="flex: 1; overflow-y: auto; margin-bottom: 16px;">
      <div class="calendar-header">
        <button class="calendar-nav-btn" id="prevMonth">◀</button>
        <h3 id="currentMonthYear">2026년 4월</h3>
        <button class="calendar-nav-btn" id="nextMonth">▶</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="event-list" id="eventList">
        <h4 style="margin-bottom: 12px;">📋 이벤트 목록</h4>
        <div id="eventListContent"></div>
      </div>
    </div>
    
    <div class="nav">
      <a href="index.html" class="nav-item">🏠 홈</a>
      <a href="units.html" class="nav-item">🏢 세대</a>
      <a href="calendar.html" class="nav-item active">📅 일정</a>
      <a href="payments.html" class="nav-item">💰 납부관리</a>
      <a href="settings.html" class="nav-item">⚙️ 설정</a>
    </div>
  </div>
  
  <!-- 로그인 모달 -->
  <div id="loginModal" class="modal">
    <div class="modal-content" style="text-align: center;">
      <div style="font-size: 48px; margin-bottom: 16px;">🔐</div>
      <h3 style="margin-bottom: 12px;">로그인이 필요합니다</h3>
      <p style="color: #64748b; margin-bottom: 24px;">일정을 확인하려면<br>로그인이 필요합니다</p>
      <button id="googleLoginBtn" class="btn-primary" style="width: 100%;">🚀 Google 로그인</button>
      <button id="closeLoginModal" class="btn-secondary" style="margin-top: 12px; width: 100%;">닫기</button>
    </div>
  </div>

  <script type="module" src="js/calendar.js"></script>
</body>
</html>
