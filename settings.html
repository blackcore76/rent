<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <title>월세 관리 - 설정</title>
  <style>
    .settings-section {
      background: #f8fafc;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .settings-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #e2e8f0;
    }
    .settings-item:last-child { border-bottom: none; }
    .settings-label { font-weight: 600; color: #1f2937; }
    .settings-desc { font-size: 12px; color: #64748b; margin-top: 4px; }
    .danger-zone {
      border: 2px solid #fee2e2;
      background: #fff5f5;
    }
    .danger-zone .settings-label { color: #dc2626; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <div class="login-box" id="loginBox">
        <div class="login-status" id="loginStatus">
          <span>🔓</span>
          <span>로그인이 필요합니다</span>
        </div>
        <button class="small-login-btn" id="headerLoginBtn">로그인</button>
      </div>
      
      <div class="building-input-wrapper">
        <span class="building-icon">🏣</span>
        <input type="text" id="buildingName" class="building-name" value="조아빌" maxlength="10" disabled>
      </div>
      <div class="top-controls">
        <select id="monthPicker" class="month-picker"></select>
        <button class="memo-btn" id="memoBtn" disabled>📝 메모</button>
      </div>
    </div>
    
    <!-- 설정 컨테이너 -->
    <div id="settingsContainer" style="flex: 1; overflow-y: auto; margin-bottom: 16px;">
      <div class="settings-section">
        <h4 style="margin-bottom: 12px;">📱 앱 설정</h4>
        <div class="settings-item">
          <div>
            <div class="settings-label">앱 버전</div>
            <div class="settings-desc">현재 버전 정보</div>
          </div>
          <span>v1.0.0</span>
        </div>
        <div class="settings-item">
          <div>
            <div class="settings-label">데이터 저장 위치</div>
            <div class="settings-desc">로컬 스토리지 + Firebase</div>
          </div>
          <span>✅ 동기화 중</span>
        </div>
      </div>
      
      <div class="settings-section">
        <h4 style="margin-bottom: 12px;">💾 데이터 관리</h4>
        <div class="settings-item">
          <div>
            <div class="settings-label">데이터 내보내기</div>
            <div class="settings-desc">JSON 파일로 백업</div>
          </div>
          <button id="exportDataBtn" class="btn-secondary" style="padding: 6px 12px;">내보내기</button>
        </div>
        <div class="settings-item">
          <div>
            <div class="settings-label">데이터 가져오기</div>
            <div class="settings-desc">백업 파일에서 복원</div>
          </div>
          <button id="importDataBtn" class="btn-secondary" style="padding: 6px 12px;">가져오기</button>
          <input type="file" id="importFile" accept=".json" style="display: none;">
        </div>
      </div>
      
      <div class="settings-section danger-zone">
        <h4 style="margin-bottom: 12px;">⚠️ 위험 구역</h4>
        <div class="settings-item">
          <div>
            <div class="settings-label">모든 데이터 초기화</div>
            <div class="settings-desc">모든 세대, 납부, 메모 데이터가 삭제됩니다</div>
          </div>
          <button id="resetDataBtn" class="btn-danger" style="padding: 6px 12px;">초기화</button>
        </div>
      </div>
      
      <div class="settings-section">
        <h4 style="margin-bottom: 12px;">ℹ️ 정보</h4>
        <div class="settings-item">
          <div>
            <div class="settings-label">개발자</div>
            <div class="settings-desc">빌리지 팀</div>
          </div>
        </div>
        <div class="settings-item">
          <div>
            <div class="settings-label">문의하기</div>
            <div class="settings-desc">support@village.com</div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="nav">
      <a href="index.html" class="nav-item">🏠 홈</a>
      <a href="units.html" class="nav-item">🏢 세대</a>
      <a href="calendar.html" class="nav-item">📅 일정</a>
      <a href="payments.html" class="nav-item">💰 납부관리</a>
      <a href="settings.html" class="nav-item active">⚙️ 설정</a>
    </div>
  </div>
  
  <!-- 로그인 모달 -->
  <div id="loginModal" class="modal">
    <div class="modal-content" style="text-align: center;">
      <div style="font-size: 48px; margin-bottom: 16px;">🔐</div>
      <h3 style="margin-bottom: 12px;">로그인이 필요합니다</h3>
      <p style="color: #64748b; margin-bottom: 24px;">설정을 변경하려면<br>로그인이 필요합니다</p>
      <button id="googleLoginBtn" class="btn-primary" style="width: 100%;">🚀 Google 로그인</button>
      <button id="closeLoginModal" class="btn-secondary" style="margin-top: 12px; width: 100%;">닫기</button>
    </div>
  </div>

  <script type="module" src="js/settings.js"></script>
</body>
</html>
