<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🛠 마스터 관리 센터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{--hdr:#1E2D3D;--bg:#F0F4F8;--text:#1E293B;--blue:#0284C7}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);padding:20px}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 4px 12px rgba(0,0,0,.1);margin-bottom:20px}
h2{font-weight:900;margin-bottom:20px;color:var(--hdr);display:flex;align-items:center;gap:10px}
.user-item{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #EEE}
.user-info b{display:block;font-size:15px}
.user-info span{font-size:12px;color:#64748B}
.btn{padding:8px 16px;border-radius:8px;border:none;font-weight:700;cursor:pointer;font-family:inherit}
.btn-manage{background:var(--blue);color:#fff}
.btn-add{background:var(--hdr);color:#fff;width:100%;padding:12px;margin-top:10px}
input{width:100%;padding:10px;margin-bottom:10px;border:2px solid #E2E8F0;border-radius:8px;outline:none}
</style>
</head>
<body>
    <div class="card">
        <h2>🛠 마스터 관리자 설정</h2>
        <p style="font-size:13px; color:#64748B; margin-bottom:20px;">관리할 사용자(B, C 등)의 UID를 등록하세요.</p>
        <input type="text" id="new-name" placeholder="사용자 이름 (예: 강남 빌라 B)">
        <input type="text" id="new-uid" placeholder="사용자 UID 입력">
        <button class="btn btn-add" onclick="addUser()">➕ 사용자 등록</button>
    </div>

    <div class="card">
        <h2>👥 관리 대상 목록</h2>
        <div id="user-list"></div>
    </div>

<script>
const FC={apiKey:"AIzaSyBHMCPX13coKBA9cu72K4k9WKYQQjVA7IA",authDomain:"rent-4d521.firebaseapp.com",databaseURL:"https://rent-4d521-default-rtdb.firebaseio.com",projectId:"rent-4d521"};
firebase.initializeApp(FC);
const db=firebase.database(), auth=firebase.auth();
const ADMIN_UID = "unGRVYWhmcMmEbYbWjAL8Y1pXVP2";

auth.onAuthStateChanged(user => {
    if(!user || user.uid !== ADMIN_UID) {
        alert("관리자 권한이 없습니다.");
        location.href = "units.html";
        return;
    }
    loadUsers();
});

function addUser() {
    const name = document.getElementById('new-name').value;
    const uid = document.getElementById('new-uid').value;
    if(!name || !uid) return alert("이름과 UID를 입력하세요.");
    db.ref(`rent_app/${ADMIN_UID}/managed_users/${uid}`).set({name, uid})
    .then(() => {
        document.getElementById('new-name').value = '';
        document.getElementById('new-uid').value = '';
        loadUsers();
    });
}

function loadUsers() {
    db.ref(`rent_app/${ADMIN_UID}/managed_users`).once('value', snap => {
        const users = snap.val() || {};
        const listDiv = document.getElementById('user-list');
        listDiv.innerHTML = '';
        Object.values(users).forEach(u => {
            listDiv.innerHTML += `
                <div class="user-item">
                    <div class="user-info"><b>${u.name}</b><span>${u.uid}</span></div>
                    <button class="btn btn-manage" onclick="goManage('${u.uid}')">관리</button>
                </div>`;
        });
    });
}

function goManage(uid) {
    location.href = `units.html?targetUid=${uid}`;
}
</script>
</body>
</html>
