<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="manifest.json" />
  <title>월세 관리 - 빌리지</title>
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    
    body {
      background: #f4f7fb;
      color: #1f2937;
      display: flex;
      justify-content: center;
      padding: 16px;
      min-height: 100vh;
    }
    
    .phone {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 32px;
      padding: 20px;
      padding-bottom: 80px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      position: relative;
      min-height: 700px;
      display: flex;
      flex-direction: column;
    }
    
    /* 헤더 */
    .header {
      margin-bottom: 24px;
    }
    
    .building-input-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .building-icon { font-size: 24px; }
    .building-name {
      font-size: 22px;
      font-weight: 800;
      background: none;
      border: none;
      padding: 4px 0;
      color: #1f2937;
      width: auto;
      min-width: 120px;
      cursor: pointer;
      border-bottom: 2px dashed #cbd5e1;
    }
    .building-name:focus { outline: none; border-bottom-color: #2563eb; }
    .building-name:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }
    
    /* 로그인 박스 */
    .login-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f1f5f9;
      padding: 8px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .login-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #64748b;
    }
    .login-status img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }
    .small-login-btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .small-logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    
    .month-picker {
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    
    .memo-btn {
      background: #f1f5f9;
      border: none;
      padding: 10px 18px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .memo-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* 카드 */
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .card {
      background: #f8fafc;
      border-radius: 20px;
      padding: 16px;
    }
    .card small { color: #64748b; display: block; margin-bottom: 8px; font-size: 12px; }
    .card strong { font-size: 28px; font-weight: 800; }
    .danger { color: #dc2626; }
    .warning { color: #d97706; }
    
    .income-card {
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: white;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .income-card strong { font-size: 32px; font-weight: 800; }
    
    .section { margin-bottom: 24px; }
    .section h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: #334155; }
    
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    
    .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-delayed { background: #fee2e2; color: #dc2626; }
    .status-expiring { background: #fffbeb; color: #d97706; }
    
    /* 하단 네비 */
    .nav {
      display: flex;
      justify-content: space-around;
      padding: 12px 0 8px;
      margin-top: auto;
      border-top: 1px solid #f1f5f9;
      background: white;
      position: sticky;
      bottom: 0;
    }
    .nav-item {
      text-align: center;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
    }
    .nav-item.active { background: #eff6ff; color: #2563eb; }
    
    /* FAB 버튼 - 하단바 위로 */
    .fab {
      position: fixed;
      bottom: 80px;
      right: calc(50% - 180px);
      width: 56px;
      height: 56px;
      border-radius: 28px;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 28px;
      box-shadow: 0 8px 20px rgba(37,99,235,0.4);
      cursor: pointer;
      z-index: 1000;
    }
    .fab:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* 모달 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white;
      border-radius: 28px;
      max-width: 400px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 24px;
    }
    
    /* 폼 스타일 */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 6px; }
    
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .form-row-30-70 { display: grid; grid-template-columns: 30% 70%; gap: 12px; margin-bottom: 16px; }
    
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    
    /* 토글 버튼 스타일 */
    .toggle-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      background: #f1f5f9;
      padding: 4px;
      border-radius: 16px;
    }
    .toggle-btn {
      text-align: center;
      padding: 10px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      border: none;
    }
    .toggle-btn.active {
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      color: #2563eb;
    }
    .toggle-btn:not(.active) { color: #64748b; }
    .toggle-btn:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }
    
    .modal-buttons { display: flex; gap: 8px; margin-top: 20px; }
    .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #f1f5f9; color: #334155; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    
    /* 사진 업로드 */
    .photo-upload-area {
      border: 2px dashed #cbd5e1;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .photo-upload-area:hover { border-color: #2563eb; background: #f8fafc; }
    .photo-upload-area.disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }
    
    .photo-preview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 80px));
      gap: 12px;
      margin-top: 12px;
    }
    .photo-item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #f1f5f9;
      aspect-ratio: 1;
      cursor: pointer;
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }
    .photo-delete {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* 이미지 확대 모달 */
    .image-viewer {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 3000;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .image-viewer.active { display: flex; }
    .image-viewer img { max-width: 90%; max-height: 90%; object-fit: contain; }
    
    /* 세대 목록 */
    .unit-list-item {
      background: #f8fafc;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .unit-list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .unit-number-badge { font-size: 18px; font-weight: 800; }
    .unit-status { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .status-vacant { background: #e2e8f0; color: #64748b; }
    .status-occupied { background: #dcfce7; color: #16a34a; }
    .unit-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; margin-bottom: 12px; }
    .unit-actions { display: flex; gap: 8px; }
    .unit-actions button { flex: 1; padding: 8px; border: none; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .unit-actions button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* 월별 납부 관리 */
    .payment-unit-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #e2e8f0;
    }
    .payment-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .payment-paid { background: #dcfce7; color: #16a34a; }
    .payment-unpaid { background: #fee2e2; color: #dc2626; }
    .toggle-payment:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* 로그인 필요 알림 */
    .login-required {
      text-align: center;
      padding: 40px 20px;
      color: #94a3b8;
    }
    .login-required button {
      margin-top: 16px;
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    
    @media (max-width: 480px) {
      .phone { padding: 16px; }
      .fab { right: 20px; bottom: 80px; }
    }
  </style>
</head>
<body>
  <div class="phone" id="app">
    <div class="header">
      <!-- 로그인 박스 -->
      <div class="login-box" id="loginBox">
        <div class="login-status" id="loginStatus">
          <span>🔓</span>
          <span>로그인이 필요합니다</span>
        </div>
        <button class="small-login-btn" id="headerLoginBtn">로그인</button>
      </div>
      
      <div class="building-input-wrapper">
        <span class="building-icon">🏣</span>
        <input type="text" id="buildingName" class="building-name" value="조아빌" maxlength="10">
      </div>
      <div class="top-controls">
        <select id="monthPicker" class="month-picker"></select>
        <button class="memo-btn" id="memoBtn">📝 메모</button>
      </div>
    </div>
    
    <div class="cards">
      <div class="card"><small>❎ 공실현황</small><strong id="vacancyRate">0%</strong></div>
      <div class="card"><small>😨 미납현황</small><strong id="unpaidCount" class="danger">0건</strong></div>
      <div class="card"><small>🔜 만기예정</small><strong id="expiringCount" class="warning">0건</strong></div>
      <div class="card"><small>🛠️ 요청사항</small><strong id="requestCount">0건</strong></div>
    </div>
    
    <div class="income-card">
      <p>💰 이번달 수입</p>
      <strong id="monthlyIncome">₩ 0</strong>
    </div>
    
    <div class="section">
      <h3>😨 미납 세대</h3>
      <div id="unpaidList"></div>
    </div>
    
    <div class="section">
      <h3>🔜 만기 예정</h3>
      <div id="expiringList"></div>
    </div>
    
    <div class="nav">
      <div class="nav-item active" data-tab="home">🏠 홈</div>
      <div class="nav-item" data-tab="units">🏢 세대</div>
      <div class="nav-item" data-tab="calendar">📅 일정</div>
      <div class="nav-item" data-tab="payments">💰 납부관리</div>
      <div class="nav-item" data-tab="settings">⚙️ 설정</div>
    </div>
  </div>
  
  <button class="fab" id="fabBtn">+</button>
  
  <!-- 로그인 모달 -->
  <div id="loginModal" class="modal">
    <div class="modal-content" style="text-align: center;">
      <div style="font-size: 48px; margin-bottom: 16px;">🔐</div>
      <h3 style="margin-bottom: 12px;">로그인이 필요합니다</h3>
      <p style="color: #64748b; margin-bottom: 24px;">읽기는 가능하지만<br>쓰기/수정/삭제는 로그인 후 이용 가능합니다</p>
      <button id="googleLoginBtn" class="btn-primary" style="width: 100%;">🚀 Google 로그인</button>
      <button id="closeLoginModal" class="btn-secondary" style="margin-top: 12px; width: 100%;">닫기</button>
    </div>
  </div>
  
  <!-- 메모 모달 -->
  <div id="memoModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-bottom: 16px;">📝 메모 작성</h3>
      <textarea id="memoText" rows="6" style="width:100%; padding:12px; border-radius:12px; border:1px solid #e2e8f0;"></textarea>
      <div class="modal-buttons">
        <button id="saveMemoBtn" class="btn-primary">저장</button>
        <button id="closeMemoBtn" class="btn-secondary">닫기</button>
      </div>
    </div>
  </div>
  
  <!-- 세대 입력 모달 -->
  <div id="unitFormModal" class="modal">
    <div class="modal-content">
      <h3 id="unitFormTitle" style="margin-bottom: 20px;">➕ 세대 정보 입력</h3>
      
      <div class="form-row-30-70">
        <div class="form-group">
          <label>호수 *</label>
          <select id="unitNumber">
            <option value="">선택</option>
            <option value="201">201호</option><option value="202">202호</option>
            <option value="203">203호</option><option value="204">204호</option>
            <option value="205">205호</option><option value="206">206호</option>
            <option value="301">301호</option><option value="302">302호</option>
            <option value="303">303호</option><option value="304">304호</option>
            <option value="305">305호</option><option value="306">306호</option>
            <option value="401">401호</option><option value="402">402호</option>
            <option value="403">403호</option><option value="404">404호</option>
            <option value="405">405호</option><option value="406">406호</option>
          </select>
        </div>
        <div class="form-group">
          <label>임차인 이름</label>
          <input type="text" id="tenantName" placeholder="이름">
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>연락처 1</label>
          <input type="tel" id="phone1" placeholder="010-0000-0000">
        </div>
        <div class="form-group">
          <label>연락처 2</label>
          <input type="tel" id="phone2" placeholder="010-0000-0000">
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>보증금 (원)</label>
          <input type="number" id="depositAmount" value="5000000">
        </div>
        <div class="form-group">
          <label>월세 (원)</label>
          <input type="number" id="rentAmount" value="500000">
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>계약 시작일</label>
          <input type="date" id="contractStart">
        </div>
        <div class="form-group">
          <label>계약 종료일</label>
          <input type="date" id="contractEnd">
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>입주 예정일</label>
          <input type="date" id="moveInDate">
        </div>
        <div class="form-group">
          <label>퇴실 예정일</label>
          <input type="date" id="moveOutDate">
        </div>
      </div>
      
      <div class="form-group">
        <label>📋 메모</label>
        <textarea id="unitMemo" rows="3" placeholder="특이사항, 요청사항 등"></textarea>
      </div>
      
      <div class="form-group">
        <label>상태</label>
        <div class="toggle-group" id="statusToggle">
          <button type="button" class="toggle-btn active" data-status="vacant">🔴 공실</button>
          <button type="button" class="toggle-btn" data-status="occupied">🟢 임대중</button>
        </div>
      </div>
      
      <div id="paymentToggleGroup" style="display: none;">
        <div class="form-group">
          <label>월세 납부 상태</label>
          <div class="toggle-group" id="paymentToggle">
            <button type="button" class="toggle-btn active" data-payment="paid">✅ 납부완료</button>
            <button type="button" class="toggle-btn" data-payment="unpaid">❌ 미납중</button>
          </div>
        </div>
      </div>
      
      <div class="form-group">
        <label>📎 계약서 사진</label>
        <div id="photoUploadArea" class="photo-upload-area">📸 사진을 선택하세요<br><small>클릭하여 업로드</small></div>
        <input type="file" id="photoInput" accept="image/*" multiple style="display: none;">
        <div id="photoPreview" class="photo-preview"></div>
      </div>
      
      <div class="modal-buttons">
        <button id="saveUnitBtn" class="btn-primary">저장</button>
        <button id="closeUnitFormBtn" class="btn-secondary">닫기</button>
      </div>
    </div>
  </div>
  
  <!-- 세대 목록 모달 -->
  <div id="unitListModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-bottom: 20px;">🏢 세대 목록</h3>
      <div id="unitListContainer" style="max-height: 500px; overflow-y: auto;"></div>
      <button id="closeUnitListBtn" class="btn-secondary" style="margin-top: 16px; width: 100%;">닫기</button>
    </div>
  </div>
  
  <!-- 이미지 확대 뷰어 -->
  <div id="imageViewer" class="image-viewer">
    <img id="viewerImage" src="">
  </div>

  <script type="module">
    // Firebase 설정 (본인 프로젝트 정보로 변경 필요)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js';
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    
    const STORAGE_KEYS = { BUILDINGS: 'building_data', UNITS: 'units_data', MEMO: 'memo_data', PAYMENTS: 'payments_data' };
    
    const generateDefaultUnits = () => {
      const units = [];
      [2,3,4].forEach(floor => {
        [1,2,3,4,5,6].forEach(num => {
          const unitNum = `${floor}0${num}`;
          units.push({
            id: unitNum, number: unitNum, tenant: '', phone1: '', phone2: '',
            rent: 500000, deposit: 5000000, contractStart: '', contractEnd: '',
            isVacant: true, moveInDate: null, moveOutDate: null, memo: '', photos: []
          });
        });
      });
      return units;
    };
    
    let currentUser = null;
    let currentBuilding = '조아빌';
    let currentYearMonth = '2026-04';
    let unitsData = [];
    let paymentsData = {};
    let tempPhotos = [];
    
    // UI 요소
    const loginBox = document.getElementById('loginBox');
    const loginStatus = document.getElementById('loginStatus');
    const headerLoginBtn = document.getElementById('headerLoginBtn');
    const loginModal = document.getElementById('loginModal');
    const googleLoginBtn = document.getElementById('googleLoginBtn');
    const closeLoginModal = document.getElementById('closeLoginModal');
    const buildingNameInput = document.getElementById('buildingName');
    const fabBtn = document.getElementById('fabBtn');
    const memoBtn = document.getElementById('memoBtn');
    
    // 로그인 UI 업데이트
    const updateLoginUI = () => {
      if (currentUser) {
        loginStatus.innerHTML = `<img src="${currentUser.photoURL || ''}" onerror="this.style.display='none'"><span>👤 ${currentUser.displayName || currentUser.email}</span>`;
        headerLoginBtn.textContent = '로그아웃';
        headerLoginBtn.className = 'small-logout-btn';
        buildingNameInput.disabled = false;
        fabBtn.disabled = false;
        memoBtn.disabled = false;
        enableWriteButtons(true);
      } else {
        loginStatus.innerHTML = '<span>🔓</span><span>로그인이 필요합니다</span>';
        headerLoginBtn.textContent = '로그인';
        headerLoginBtn.className = 'small-login-btn';
        buildingNameInput.disabled = true;
        fabBtn.disabled = true;
        memoBtn.disabled = true;
        enableWriteButtons(false);
      }
    };
    
    // 쓰기 버튼들 활성화/비활성화
    const enableWriteButtons = (enabled) => {
      const btns = document.querySelectorAll('.unit-actions button, .toggle-payment, .photo-delete, .toggle-btn, #saveUnitBtn, #saveMemoBtn');
      btns.forEach(btn => {
        if (btn) btn.disabled = !enabled;
      });
      const uploadArea = document.getElementById('photoUploadArea');
      if (uploadArea) {
        if (enabled) uploadArea.classList.remove('disabled');
        else uploadArea.classList.add('disabled');
      }
    };
    
    // 로그인 필요 알림
    const requireLogin = () => {
      loginModal.classList.add('active');
    };
    
    // 데이터 로드
    const loadData = () => {
      const savedBuilding = localStorage.getItem(`${STORAGE_KEYS.BUILDINGS}_${currentYearMonth}`);
      if (savedBuilding) { currentBuilding = savedBuilding; buildingNameInput.value = currentBuilding; }
      
      const savedUnits = localStorage.getItem(`${STORAGE_KEYS.UNITS}_${currentBuilding}`);
      unitsData = savedUnits ? JSON.parse(savedUnits) : generateDefaultUnits();
      saveUnitsData();
      
      const savedPayments = localStorage.getItem(`${STORAGE_KEYS.PAYMENTS}_${currentBuilding}`);
      paymentsData = savedPayments ? JSON.parse(savedPayments) : {};
    };
    
    const saveUnitsData = () => localStorage.setItem(`${STORAGE_KEYS.UNITS}_${currentBuilding}`, JSON.stringify(unitsData));
    const savePaymentsData = () => localStorage.setItem(`${STORAGE_KEYS.PAYMENTS}_${currentBuilding}`, JSON.stringify(paymentsData));
    
    const getPaymentStatus = (unitId, yearMonth) => paymentsData[yearMonth]?.[unitId] ?? true;
    const setPaymentStatus = (unitId, yearMonth, isPaid) => {
      if (!currentUser) { requireLogin(); return false; }
      if (!paymentsData[yearMonth]) paymentsData[yearMonth] = {};
      paymentsData[yearMonth][unitId] = isPaid;
      savePaymentsData();
      return true;
    };
    
    // 대시보드
    const updateDashboard = () => {
      const vacantUnits = unitsData.filter(u => u.isVacant);
      document.getElementById('vacancyRate').innerHTML = `${Math.round((vacantUnits.length/unitsData.length)*100)}%`;
      
      const unpaidUnits = unitsData.filter(u => !u.isVacant && !getPaymentStatus(u.id, currentYearMonth));
      document.getElementById('unpaidCount').innerHTML = `${unpaidUnits.length}건`;
      
      const today = new Date();
      const endOfNextMonth = new Date(today.getFullYear(), today.getMonth() + 2, 0);
      const expiringUnits = unitsData.filter(u => !u.isVacant && u.contractEnd && new Date(u.contractEnd) <= endOfNextMonth && new Date(u.contractEnd) >= today);
      document.getElementById('expiringCount').innerHTML = `${expiringUnits.length}건`;
      
      const requestsCount = unitsData.reduce((sum, u) => sum + (u.requests?.length || 0), 0);
      document.getElementById('requestCount').innerHTML = `${requestsCount}건`;
      
      const totalRent = unitsData.filter(u => !u.isVacant && getPaymentStatus(u.id, currentYearMonth)).reduce((sum, u) => sum + (u.rent || 0), 0);
      document.getElementById('monthlyIncome').innerHTML = `₩ ${totalRent.toLocaleString()}`;
      
      const unpaidListDiv = document.getElementById('unpaidList');
      if (unpaidUnits.length === 0) {
        unpaidListDiv.innerHTML = '<div class="list-item" style="color:#94a3b8;">✨ 모든 세대가 납부 완료!</div>';
      } else {
        unpaidListDiv.innerHTML = unpaidUnits.map(u => `<div class="list-item"><span>${u.number}호 ${u.tenant || '미기입'}</span><span class="status-badge status-delayed">미납</span></div>`).join('');
      }
      
      const expiringListDiv = document.getElementById('expiringList');
      if (expiringUnits.length === 0) {
        expiringListDiv.innerHTML = '<div class="list-item" style="color:#94a3b8;">📋 만기 예정 계약이 없습니다</div>';
      } else {
        expiringListDiv.innerHTML = expiringUnits.map(u => {
          const daysLeft = Math.ceil((new Date(u.contractEnd) - new Date()) / (1000*60*60*24));
          return `<div class="list-item"><span>${u.number}호 ${u.tenant || '미기입'}</span><span class="status-badge status-expiring">D-${daysLeft}</span></div>`;
        }).join('');
      }
    };
    
    // 납부 관리 화면
    const updatePaymentView = () => {
      let paymentDiv = document.getElementById('paymentView');
      if (!paymentDiv) {
        paymentDiv = document.createElement('div');
        paymentDiv.id = 'paymentView';
        document.getElementById('app').appendChild(paymentDiv);
      }
      
      const occupiedUnits = unitsData.filter(u => !u.isVacant);
      paymentDiv.innerHTML = `
        <h3 style="margin-bottom:16px;">💰 ${currentYearMonth} 월세 납부 현황</h3>
        <div style="background:#f8fafc; border-radius:16px; padding:8px;">
          ${occupiedUnits.map(unit => {
            const isPaid = getPaymentStatus(unit.id, currentYearMonth);
            return `
              <div class="payment-unit-item">
                <div><strong>${unit.number}호</strong><br><small>${unit.tenant || '미기입'}</small></div>
                <div>
                  <span class="payment-badge ${isPaid ? 'payment-paid' : 'payment-unpaid'}">${isPaid ? '✅ 납부완료' : '❌ 미납'}</span>
                  <button class="toggle-payment" data-id="${unit.id}" style="margin-left:8px; padding:6px 12px; border-radius:10px; border:none; background:#2563eb; color:white; cursor:pointer;" ${!currentUser ? 'disabled' : ''}>
                    ${isPaid ? '미납으로 변경' : '납부완료로 변경'}
                  </button>
                </div>
              </div>
            `;
          }).join('')}
          ${occupiedUnits.length === 0 ? '<div style="padding:20px; text-align:center; color:#94a3b8;">📭 임대중인 세대가 없습니다</div>' : ''}
        </div>
        <div class="form-group" style="margin-top:16px;">
          <label>📝 월별 한줄 메모</label>
          <textarea id="monthlyMemo" rows="2" placeholder="이번달 특이사항을 입력하세요..." style="width:100%; padding:12px; border-radius:12px; border:1px solid #e2e8f0;" ${!currentUser ? 'disabled' : ''}></textarea>
          <button id="saveMonthlyMemo" class="btn-primary" style="margin-top:8px; width:100%;" ${!currentUser ? 'disabled' : ''}>메모 저장</button>
        </div>
        <button id="backFromPayment" style="margin-top:16px; width:100%; padding:12px; background:#64748b; color:white; border:none; border-radius:12px;">홈으로</button>
      `;
      
      const savedMonthlyMemo = localStorage.getItem(`${STORAGE_KEYS.MEMO}_monthly_${currentBuilding}_${currentYearMonth}`) || '';
      document.getElementById('monthlyMemo') && (document.getElementById('monthlyMemo').value = savedMonthlyMemo);
      
      document.querySelectorAll('.toggle-payment').forEach(btn => {
        btn.addEventListener('click', (e) => {
          if (!currentUser) { requireLogin(); return; }
          const unitId = btn.dataset.id;
          const currentStatus = getPaymentStatus(unitId, currentYearMonth);
          setPaymentStatus(unitId, currentYearMonth, !currentStatus);
          updatePaymentView();
          updateDashboard();
        });
      });
      
      document.getElementById('saveMonthlyMemo')?.addEventListener('click', () => {
        if (!currentUser) { requireLogin(); return; }
        const memo = document.getElementById('monthlyMemo').value;
        localStorage.setItem(`${STORAGE_KEYS.MEMO}_monthly_${currentBuilding}_${currentYearMonth}`, memo);
        alert('월별 메모가 저장되었습니다!');
      });
      
      document.getElementById('backFromPayment')?.addEventListener('click', () => {
        document.querySelector('.nav-item[data-tab="home"]').click();
      });
    };
    
    // 사진 처리 (이전과 동일)
    const fileToBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
    });
    
    const updatePhotoPreview = () => {
      const previewDiv = document.getElementById('photoPreview');
      previewDiv.innerHTML = tempPhotos.map((photo, index) => `
        <div class="photo-item" data-index="${index}">
          <img src="${photo}" alt="계약서">
          <button class="photo-delete" data-index="${index}" ${!currentUser ? 'disabled' : ''}>×</button>
        </div>
      `).join('');
      
      document.querySelectorAll('.photo-item').forEach(item => {
        item.addEventListener('click', (e) => {
          if (e.target.classList.contains('photo-delete')) return;
          const img = item.querySelector('img');
          document.getElementById('viewerImage').src = img.src;
          document.getElementById('imageViewer').classList.add('active');
        });
      });
      
      document.querySelectorAll('.photo-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!currentUser) { requireLogin(); return; }
          const index = parseInt(btn.dataset.index);
          tempPhotos.splice(index, 1);
          updatePhotoPreview();
        });
      });
    };
    
    const setupPhotoUpload = () => {
      const uploadArea = document.getElementById('photoUploadArea');
      const photoInput = document.getElementById('photoInput');
      uploadArea.addEventListener('click', () => {
        if (!currentUser) { requireLogin(); return; }
        photoInput.click();
      });
      photoInput.addEventListener('change', async (e) => {
        if (!currentUser) { requireLogin(); return; }
        for (const file of Array.from(e.target.files)) {
          if (file.type.startsWith('image/')) tempPhotos.push(await fileToBase64(file));
        }
        updatePhotoPreview();
        photoInput.value = '';
      });
    };
    
    // 토글 버튼 초기화
    const initToggles = () => {
      const statusBtns = document.querySelectorAll('#statusToggle .toggle-btn');
      const paymentBtns = document.querySelectorAll('#paymentToggle .toggle-btn');
      
      statusBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          if (!currentUser) { requireLogin(); return; }
          statusBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const isVacant = btn.dataset.status === 'vacant';
          document.getElementById('paymentToggleGroup').style.display = isVacant ? 'none' : 'block';
        });
      });
      
      paymentBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          if (!currentUser) { requireLogin(); return; }
          paymentBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });
    };
    
    const resetUnitForm = () => {
      tempPhotos = [];
      document.getElementById('unitFormTitle').innerText = '➕ 세대 정보 입력';
      document.getElementById('unitNumber').value = '';
      document.getElementById('unitNumber').disabled = false;
      document.getElementById('tenantName').value = '';
      document.getElementById('phone1').value = '';
      document.getElementById('phone2').value = '';
      document.getElementById('depositAmount').value = '5000000';
      document.getElementById('rentAmount').value = '500000';
      document.getElementById('contractStart').value = '';
      document.getElementById('contractEnd').value = '';
      document.getElementById('moveInDate').value = '';
      document.getElementById('moveOutDate').value = '';
      document.getElementById('unitMemo').value = '';
      document.querySelector('#statusToggle .toggle-btn[data-status="vacant"]').click();
      document.querySelector('#paymentToggle .toggle-btn[data-payment="paid"]').click();
      document.getElementById('photoPreview').innerHTML = '';
    };
    
    const saveUnit = () => {
      if (!currentUser) { requireLogin(); return; }
      
      const unitNumber = document.getElementById('unitNumber').value;
      if (!unitNumber) { alert('호수를 선택해주세요!'); return; }
      
      const isVacant = document.querySelector('#statusToggle .toggle-btn.active').dataset.status === 'vacant';
      
      const unitData = {
        id: unitNumber, number: unitNumber,
        tenant: document.getElementById('tenantName').value,
        phone1: document.getElementById('phone1').value,
        phone2: document.getElementById('phone2').value,
        deposit: parseInt(document.getElementById('depositAmount').value) || 0,
        rent: parseInt(document.getElementById('rentAmount').value) || 0,
        contractStart: document.getElementById('contractStart').value,
        contractEnd: document.getElementById('contractEnd').value,
        moveInDate: document.getElementById('moveInDate').value || null,
        moveOutDate: document.getElementById('moveOutDate').value || null,
        memo: document.getElementById('unitMemo').value,
        isVacant: isVacant,
        photos: tempPhotos,
        requests: []
      };
      
      const index = unitsData.findIndex(u => u.id === unitNumber);
      if (index !== -1) unitsData[index] = { ...unitsData[index], ...unitData };
      else unitsData.push(unitData);
      
      if (!isVacant) {
        const isPaid = document.querySelector('#paymentToggle .toggle-btn.active').dataset.payment === 'paid';
        setPaymentStatus(unitNumber, currentYearMonth, isPaid);
      }
      
      saveUnitsData();
      updateDashboard();
      closeUnitFormModal();
      alert('저장되었습니다!');
    };
    
    const openEditUnitForm = (unitId) => {
      if (!currentUser) { requireLogin(); return; }
      
      const unit = unitsData.find(u => u.id === unitId);
      if (!unit) return;
      
      tempPhotos = [...(unit.photos || [])];
      document.getElementById('unitFormTitle').innerText = '✏️ 세대 정보 수정';
      document.getElementById('unitNumber').value = unit.number;
      document.getElementById('unitNumber').disabled = true;
      document.getElementById('tenantName').value = unit.tenant || '';
      document.getElementById('phone1').value = unit.phone1 || '';
      document.getElementById('phone2').value = unit.phone2 || '';
      document.getElementById('depositAmount').value = unit.deposit;
      document.getElementById('rentAmount').value = unit.rent;
      document.getElementById('contractStart').value = unit.contractStart || '';
      document.getElementById('contractEnd').value = unit.contractEnd || '';
      document.getElementById('moveInDate').value = unit.moveInDate || '';
      document.getElementById('moveOutDate').value = unit.moveOutDate || '';
      document.getElementById('unitMemo').value = unit.memo || '';
      
      const statusBtn = unit.isVacant ? '[data-status="vacant"]' : '[data-status="occupied"]';
      document.querySelector(`#statusToggle .toggle-btn${statusBtn}`).click();
      
      if (!unit.isVacant) {
        const currentPaid = getPaymentStatus(unit.id, currentYearMonth);
        const paymentBtn = currentPaid ? '[data-payment="paid"]' : '[data-payment="unpaid"]';
        document.querySelector(`#paymentToggle .toggle-btn${paymentBtn}`).click();
      }
      
      updatePhotoPreview();
      document.getElementById('unitFormModal').classList.add('active');
    };
    
    const deleteUnit = (unitId) => {
      if (!currentUser) { requireLogin(); return; }
      if (confirm('정말 삭제하시겠습니까?')) {
        unitsData = unitsData.filter(u => u.id !== unitId);
        saveUnitsData();
        updateDashboard();
        showUnitList();
      }
    };
    
    const showUnitList = () => {
      const container = document.getElementById('unitListContainer');
      container.innerHTML = unitsData.map(unit => `
        <div class="unit-list-item">
          <div class="unit-list-header">
            <span class="unit-number-badge">🏠 ${unit.number}호</span>
            <span class="unit-status ${unit.isVacant ? 'status-vacant' : 'status-occupied'}">${unit.isVacant ? '🔴 공실' : '🟢 임대중'}</span>
          </div>
          <div class="unit-info">
            <div><strong>임차인</strong><br>${unit.tenant || '-'}</div>
            <div><strong>연락처</strong><br>${unit.phone1 || '-'}${unit.phone2 ? `<br>${unit.phone2}` : ''}</div>
            <div><strong>월세/보증금</strong><br>${unit.rent.toLocaleString()} / ${unit.deposit.toLocaleString()}</div>
            <div><strong>계약기간</strong><br>${unit.contractStart || '-'} ~ ${unit.contractEnd || '-'}</div>
          </div>
          ${unit.memo ? `<div style="font-size:12px; color:#64748b; margin-bottom:12px;">📝 ${unit.memo}</div>` : ''}
          ${unit.photos?.length ? `<div style="font-size:12px; color:#2563eb;">📎 계약서 ${unit.photos.length}장</div>` : ''}
          <div class="unit-actions">
            <button class="btn-secondary" onclick="window.editUnit('${unit.id}')" ${!currentUser ? 'disabled' : ''}>수정</button>
            <button class="btn-danger" onclick="window.deleteUnit('${unit.id}')" ${!currentUser ? 'disabled' : ''}>삭제</button>
          </div>
        </div>
      `).join('');
      document.getElementById('unitListModal').classList.add('active');
    };
    
    const closeUnitFormModal = () => { resetUnitForm(); document.getElementById('unitFormModal').classList.remove('active'); };
    
    // 월 선택기
    const initMonthPicker = () => {
      const picker = document.getElementById('monthPicker');
      const today = new Date();
      for (let i = -5; i <= 5; i++) {
        const date = new Date(today.getFullYear(), today.getMonth() + i, 1);
        const yearMonth = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        picker.innerHTML += `<option value="${yearMonth}" ${yearMonth === currentYearMonth ? 'selected' : ''}>${date.getFullYear()}년 ${date.getMonth()+1}월</option>`;
      }
      picker.addEventListener('change', (e) => { currentYearMonth = e.target.value; loadData(); updateDashboard(); updatePaymentView(); });
    };
    
    // 이벤트 바인딩
    buildingNameInput.addEventListener('change', (e) => {
      if (!currentUser) { requireLogin(); buildingNameInput.value = currentBuilding; return; }
      currentBuilding = e.target.value;
      localStorage.setItem(`${STORAGE_KEYS.BUILDINGS}_${currentYearMonth}`, currentBuilding);
      loadData(); updateDashboard();
    });
    
    memoBtn.addEventListener('click', () => {
      if (!currentUser) { requireLogin(); return; }
      const savedMemo = localStorage.getItem(`${STORAGE_KEYS.MEMO}_${currentBuilding}_${currentYearMonth}`) || '';
      document.getElementById('memoText').value = savedMemo;
      document.getElementById('memoModal').classList.add('active');
    });
    
    document.getElementById('saveMemoBtn').addEventListener('click', () => {
      if (!currentUser) { requireLogin(); return; }
      localStorage.setItem(`${STORAGE_KEYS.MEMO}_${currentBuilding}_${currentYearMonth}`, document.getElementById('memoText').value);
      document.getElementById('memoModal').classList.remove('active');
      alert('메모 저장됨');
    });
    document.getElementById('closeMemoBtn').addEventListener('click', () => document.getElementById('memoModal').classList.remove('active'));
    
    fabBtn.addEventListener('click', () => {
      if (!currentUser) { requireLogin(); return; }
      resetUnitForm();
      document.getElementById('unitFormModal').classList.add('active');
    });
    document.getElementById('saveUnitBtn').addEventListener('click', saveUnit);
    document.getElementById('closeUnitFormBtn').addEventListener('click', closeUnitFormModal);
    document.getElementById('closeUnitListBtn').addEventListener('click', () => document.getElementById('unitListModal').classList.remove('active'));
    
    document.getElementById('imageViewer').addEventListener('click', () => document.getElementById('imageViewer').classList.remove('active'));
    
    window.editUnit = openEditUnitForm;
    window.deleteUnit = deleteUnit;
    
    // 로그인 관련
    headerLoginBtn.addEventListener('click', () => {
      if (currentUser) {
        signOut(auth);
      } else {
        loginModal.classList.add('active');
      }
    });
    
    googleLoginBtn.addEventListener('click', async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        currentUser = result.user;
        updateLoginUI();
        loginModal.classList.remove('active');
      } catch (error) {
        console.error(error);
        alert('로그인 실패');
      }
    });
    
    closeLoginModal.addEventListener('click', () => {
      loginModal.classList.remove('active');
    });
    
    // 탭 전환
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        const tab = item.dataset.tab;
        
        // 비로그인 시 세대/납부관리/설정 탭 클릭하면 로그인 요청
        if (!currentUser && (tab === 'units' || tab === 'payments' || tab === 'settings')) {
          requireLogin();
          return;
        }
        
        navItems.forEach(nav => nav.classList.remove('active'));
        item.classList.add('active');
        
        document.querySelectorAll('.cards, .income-card, .section').forEach(el => {
          if (el.parentElement === document.getElementById('app')) el.style.display = 'none';
        });
        fabBtn.style.display = 'none';
        ['calendarView', 'settingsView', 'paymentView'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.style.display = 'none';
        });
        
        if (tab === 'home') {
          document.querySelectorAll('.cards, .income-card, .section').forEach(el => {
            if (el.parentElement === document.getElementById('app')) el.style.display = '';
          });
          fabBtn.style.display = 'flex';
          updateDashboard();
        } else if (tab === 'units') {
          showUnitList();
        } else if (tab === 'payments') {
          updatePaymentView();
          document.getElementById('paymentView').style.display = 'block';
        } else if (tab === 'calendar') {
          let calDiv = document.getElementById('calendarView') || (() => { const div = document.createElement('div'); div.id = 'calendarView'; document.getElementById('app').appendChild(div); return div; })();
          calDiv.style.display = 'block';
          const events = unitsData.filter(u => u.moveInDate || u.moveOutDate);
          calDiv.innerHTML = `<h3>📅 입주/퇴실 일정</h3><div style="background:#f8fafc; border-radius:16px; padding:16px;">${events.map(u => `<div style="padding:8px 0;"><strong>${u.number}호</strong> ${u.moveInDate ? `🏠 입주 ${u.moveInDate}` : ''} ${u.moveOutDate ? `🚪 퇴실 ${u.moveOutDate}` : ''}</div>`).join('') || '등록된 일정이 없습니다'}</div><button id="backHome" style="margin-top:16px; width:100%; padding:12px; background:#2563eb; color:white; border:none; border-radius:12px;">홈</button>`;
          document.getElementById('backHome')?.addEventListener('click', () => document.querySelector('.nav-item[data-tab="home"]').click());
        } else if (tab === 'settings') {
          let setDiv = document.getElementById('settingsView') || (() => { const div = document.createElement('div'); div.id = 'settingsView'; document.getElementById('app').appendChild(div); return div; })();
          setDiv.style.display = 'block';
          setDiv.innerHTML = `<h3>⚙️ 설정</h3><button id="resetData" style="width:100%; padding:12px; background:#ef4444; color:white; border:none; border-radius:12px; margin-bottom:12px;">모든 데이터 초기화</button><button id="exportData" style="width:100%; padding:12px; background:#10b981; color:white; border:none; border-radius:12px;">데이터 내보내기</button><button id="backHomeSet" style="margin-top:12px; width:100%; padding:12px; background:#64748b; color:white; border:none; border-radius:12px;">홈</button>`;
          document.getElementById('resetData')?.addEventListener('click', () => { if(confirm('초기화?')){localStorage.clear(); location.reload();} });
          document.getElementById('exportData')?.addEventListener('click', () => { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify({building:currentBuilding, units:unitsData, payments:paymentsData})])); a.download='data.json'; a.click(); });
          document.getElementById('backHomeSet')?.addEventListener('click', () => document.querySelector('.nav-item[data-tab="home"]').click());
        }
      });
    });
    
    // 인증 상태 감지
    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      updateLoginUI();
      loadData();
      updateDashboard();
    });
    
    setupPhotoUpload();
    initMonthPicker();
    loadData();
    updateDashboard();
    initToggles();
    
    window.addEventListener('click', (e) => { if (e.target.classList.contains('modal')) e.target.classList.remove('active'); });
  </script>
</body>
</html>
