<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="manifest.json" />
  <title>월세 관리 - 빌리지</title>
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    
    body {
      background: #f4f7fb;
      color: #1f2937;
      display: flex;
      justify-content: center;
      padding: 16px;
      min-height: 100vh;
    }
    
    /* 모바일 컨테이너 */
    .phone {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 32px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      position: relative;
      min-height: 700px;
      display: flex;
      flex-direction: column;
    }
    
    /* 헤더 */
    .header {
      margin-bottom: 24px;
    }
    
    .building-input-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .building-icon {
      font-size: 24px;
    }
    
    .building-name {
      font-size: 22px;
      font-weight: 800;
      background: none;
      border: none;
      padding: 4px 0;
      color: #1f2937;
      width: auto;
      min-width: 120px;
      cursor: pointer;
      border-bottom: 2px dashed #cbd5e1;
    }
    
    .building-name:focus {
      outline: none;
      border-bottom-color: #2563eb;
    }
    
    /* 한 줄에 월별 선택 + 메모 버튼 */
    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    
    .month-picker {
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: auto;
    }
    
    .memo-btn {
      background: #f1f5f9;
      border: none;
      padding: 10px 18px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    
    .memo-btn:hover {
      background: #e2e8f0;
    }
    
    /* 카드 그리드 */
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .card {
      background: #f8fafc;
      border-radius: 20px;
      padding: 16px;
      transition: transform 0.2s;
    }
    
    .card small {
      color: #64748b;
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
    }
    
    .card strong {
      font-size: 28px;
      font-weight: 800;
    }
    
    .danger { color: #dc2626; }
    .warning { color: #d97706; }
    .success { color: #10b981; }
    
    /* 수입 카드 */
    .income-card {
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: white;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .income-card p {
      opacity: 0.9;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    .income-card strong {
      font-size: 32px;
      font-weight: 800;
    }
    
    /* 섹션 */
    .section {
      margin-bottom: 24px;
    }
    
    .section h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #334155;
    }
    
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    
    .list-item:last-child {
      border-bottom: none;
    }
    
    .unit-number {
      font-weight: 600;
    }
    
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-delayed {
      background: #fee2e2;
      color: #dc2626;
    }
    
    .status-expiring {
      background: #fffbeb;
      color: #d97706;
    }
    
    /* 하단 네비게이션 */
    .nav {
      display: flex;
      justify-content: space-around;
      padding: 12px 0 8px;
      margin-top: auto;
      border-top: 1px solid #f1f5f9;
      background: white;
    }
    
    .nav-item {
      text-align: center;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 24px;
      transition: all 0.2s;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
    }
    
    .nav-item.active {
      background: #eff6ff;
      color: #2563eb;
    }
    
    /* FAB 버튼 */
    .fab {
      position: fixed;
      bottom: 24px;
      right: calc(50% - 180px);
      width: 56px;
      height: 56px;
      border-radius: 28px;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 28px;
      font-weight: 300;
      box-shadow: 0 8px 20px rgba(37,99,235,0.4);
      cursor: pointer;
      transition: all 0.2s;
      z-index: 1000;
    }
    
    .fab:hover {
      transform: scale(1.05);
    }
    
    /* 모달 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: white;
      border-radius: 28px;
      max-width: 400px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
    }
    
    /* 폼 스타일 */
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 6px;
    }
    
    .form-group input, 
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .form-group input:focus, 
    .form-group select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    
    .radio-group {
      display: flex;
      gap: 16px;
      margin-top: 8px;
    }
    
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: normal;
      cursor: pointer;
    }
    
    .radio-group input {
      width: auto;
    }
    
    .modal-buttons {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    
    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    
    .btn-primary:hover {
      background: #1d4ed8;
    }
    
    .btn-secondary {
      background: #f1f5f9;
      color: #334155;
    }
    
    .btn-secondary:hover {
      background: #e2e8f0;
    }
    
    .btn-danger {
      background: #fee2e2;
      color: #dc2626;
    }
    
    .btn-danger:hover {
      background: #fecaca;
    }
    
    /* 세대 목록 스타일 */
    .unit-list-item {
      background: #f8fafc;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    
    .unit-list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .unit-number-badge {
      font-size: 18px;
      font-weight: 800;
      color: #1f2937;
    }
    
    .unit-status {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-vacant {
      background: #e2e8f0;
      color: #64748b;
    }
    
    .status-occupied {
      background: #dcfce7;
      color: #16a34a;
    }
    
    .unit-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    
    .unit-info-item {
      color: #475569;
    }
    
    .unit-info-item strong {
      color: #1f2937;
    }
    
    .unit-actions {
      display: flex;
      gap: 8px;
    }
    
    .unit-actions button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* 반응형 */
    @media (max-width: 480px) {
      .phone {
        padding: 16px;
      }
      .fab {
        right: 20px;
        bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="phone" id="app">
    <!-- 헤더 -->
    <div class="header">
      <div class="building-input-wrapper">
        <span class="building-icon">🏣</span>
        <input type="text" id="buildingName" class="building-name" value="조아빌" maxlength="20">
      </div>
      
      <div class="top-controls">
        <select id="monthPicker" class="month-picker"></select>
        <button class="memo-btn" id="memoBtn">📝 메모</button>
      </div>
    </div>
    
    <!-- 대시보드 카드 -->
    <div class="cards">
      <div class="card">
        <small>❎ 공실현황</small>
        <strong id="vacancyRate">0%</strong>
      </div>
      <div class="card">
        <small>😨 미납현황</small>
        <strong id="unpaidCount" class="danger">0건</strong>
      </div>
      <div class="card">
        <small>🔜 만기예정</small>
        <strong id="expiringCount" class="warning">0건</strong>
      </div>
      <div class="card">
        <small>🛠️ 요청사항</small>
        <strong id="requestCount">0건</strong>
      </div>
    </div>
    
    <!-- 수입 -->
    <div class="income-card">
      <p>💰 이번달 수입</p>
      <strong id="monthlyIncome">₩ 0</strong>
    </div>
    
    <!-- 미납 세대 목록 -->
    <div class="section">
      <h3>😨 미납 세대</h3>
      <div id="unpaidList"></div>
    </div>
    
    <!-- 만기 예정 -->
    <div class="section">
      <h3>🔜 만기 예정</h3>
      <div id="expiringList"></div>
    </div>
    
    <!-- 하단 네비게이션 -->
    <div class="nav">
      <div class="nav-item active" data-tab="home">🏠 홈</div>
      <div class="nav-item" data-tab="units">🏢 세대</div>
      <div class="nav-item" data-tab="calendar">📅 일정</div>
      <div class="nav-item" data-tab="settings">⚙️ 설정</div>
    </div>
  </div>
  
  <button class="fab" id="fabBtn">+</button>
  
  <!-- 메모 모달 -->
  <div id="memoModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-bottom: 16px;">📝 메모 작성</h3>
      <textarea id="memoText" rows="6" style="width:100%; padding:12px; border-radius:12px; border:1px solid #e2e8f0; font-size:14px;" placeholder="메모를 입력하세요..."></textarea>
      <div class="modal-buttons">
        <button id="saveMemoBtn" class="btn-primary">저장</button>
        <button id="closeMemoBtn" class="btn-secondary">닫기</button>
      </div>
    </div>
  </div>
  
  <!-- 세대 입력/수정 모달 -->
  <div id="unitFormModal" class="modal">
    <div class="modal-content">
      <h3 id="unitFormTitle" style="margin-bottom: 20px;">➕ 세대 정보 입력</h3>
      <div id="unitFormFields">
        <div class="form-group">
          <label>호수 *</label>
          <select id="unitNumber" class="unit-number-select">
            <option value="">호수를 선택하세요</option>
            <option value="201">201호</option>
            <option value="202">202호</option>
            <option value="203">203호</option>
            <option value="204">204호</option>
            <option value="205">205호</option>
            <option value="206">206호</option>
            <option value="301">301호</option>
            <option value="302">302호</option>
            <option value="303">303호</option>
            <option value="304">304호</option>
            <option value="305">305호</option>
            <option value="306">306호</option>
            <option value="401">401호</option>
            <option value="402">402호</option>
            <option value="403">403호</option>
            <option value="404">404호</option>
            <option value="405">405호</option>
            <option value="406">406호</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>임차인 이름</label>
          <input type="text" id="tenantName" placeholder="예: 김철수">
        </div>
        
        <div class="form-group">
          <label>연락처</label>
          <input type="tel" id="phoneNumber" placeholder="010-0000-0000">
          <input type="tel" id="phoneNumber" placeholder="010-0000-0000">
        </div>
        
        <div class="form-group">
          <label>월세 (원)</label>
          <input type="number" id="rentAmount" placeholder="500,000" value="500000">
        </div>
        
        <div class="form-group">
          <label>보증금 (원)</label>
          <input type="number" id="depositAmount" placeholder="5,000,000" value="5000000">
        </div>
        
        <div class="form-group">
          <label>계약 시작일</label>
          <input type="date" id="contractStart">
        </div>
        
        <div class="form-group">
          <label>계약 종료일</label>
          <input type="date" id="contractEnd">
        </div>
        
        <div class="form-group">
          <label>상태</label>
          <div class="radio-group">
            <label>
              <input type="radio" name="status" value="vacant" checked> 공실
            </label>
            <label>
              <input type="radio" name="status" value="occupied"> 임대중
            </label>
          </div>
        </div>
        
        <div class="form-group" id="paymentGroup" style="display: none;">
          <label>월세 납부 상태</label>
          <div class="radio-group">
            <label>
              <input type="radio" name="payment" value="paid" checked> 납부 완료
            </label>
            <label>
              <input type="radio" name="payment" value="unpaid"> 미납
            </label>
          </div>
        </div>
        
        <div class="form-group">
          <label>입주 예정일 (선택)</label>
          <input type="date" id="moveInDate">
        </div>
        
        <div class="form-group">
          <label>퇴실 예정일 (선택)</label>
          <input type="date" id="moveOutDate">
        </div>
      </div>
      
      <div class="modal-buttons">
        <button id="saveUnitBtn" class="btn-primary">저장</button>
        <button id="closeUnitFormBtn" class="btn-secondary">닫기</button>
      </div>
    </div>
  </div>
  
  <!-- 세대 목록 모달 -->
  <div id="unitListModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-bottom: 20px;">🏢 세대 목록</h3>
      <div id="unitListContainer" style="max-height: 500px; overflow-y: auto;"></div>
      <button id="closeUnitListBtn" class="btn-secondary" style="margin-top: 16px; width: 100%;">닫기</button>
    </div>
  </div>

  <script type="module">
    // Firebase 설정 (실제 프로젝트로 교체 필요)
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
    import { getFirestore } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';
    import { getStorage } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js';
    
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    
    const USE_FIREBASE = false;
    let app, db, storage;
    if (USE_FIREBASE) {
      app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      storage = getStorage(app);
    }
    
    // 로컬 스토리지 키
    const STORAGE_KEYS = {
      BUILDINGS: 'building_data',
      UNITS: 'units_data',
      MEMO: 'memo_data'
    };
    
    // 기본 세대 데이터
    const generateDefaultUnits = () => {
      const units = [];
      const floors = [2, 3, 4];
      const numbers = [1, 2, 3, 4, 5, 6];
      floors.forEach(floor => {
        numbers.forEach(num => {
          const unitNum = `${floor}0${num}`;
          units.push({
            id: unitNum,
            number: unitNum,
            tenant: '',
            phone: '',
            rent: 500000,
            deposit: 5000000,
            contractStart: '',
            contractEnd: '',
            isVacant: true,
            isPaid: true,
            requests: [],
            moveInDate: null,
            moveOutDate: null
          });
        });
      });
      return units;
    };
    
    // 상태 관리
    let currentBuilding = '조아빌';
    let currentYearMonth = '2026-04';
    let unitsData = [];
    let currentTab = 'home';
    let editingUnitId = null;
    
    // 월 선택기 초기화
    const initMonthPicker = () => {
      const picker = document.getElementById('monthPicker');
      const months = [];
      const today = new Date();
      for (let i = -5; i <= 5; i++) {
        const date = new Date(today.getFullYear(), today.getMonth() + i, 1);
        const yearMonth = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        const display = `${date.getFullYear()}년 ${date.getMonth() + 1}월`;
        months.push({ value: yearMonth, label: display });
      }
      picker.innerHTML = months.map(m => `<option value="${m.value}" ${m.value === currentYearMonth ? 'selected' : ''}>${m.label}</option>`);
      picker.addEventListener('change', (e) => {
        currentYearMonth = e.target.value;
        loadData();
        updateDashboard();
      });
    };
    
    // 데이터 로드
    const loadData = () => {
      const savedBuilding = localStorage.getItem(`${STORAGE_KEYS.BUILDINGS}_${currentYearMonth}`);
      if (savedBuilding) {
        currentBuilding = savedBuilding;
        document.getElementById('buildingName').value = currentBuilding;
      }
      
      const savedUnits = localStorage.getItem(`${STORAGE_KEYS.UNITS}_${currentBuilding}`);
      if (savedUnits) {
        unitsData = JSON.parse(savedUnits);
      } else {
        unitsData = generateDefaultUnits();
        saveUnitsData();
      }
    };
    
    const saveUnitsData = () => {
      localStorage.setItem(`${STORAGE_KEYS.UNITS}_${currentBuilding}`, JSON.stringify(unitsData));
    };
    
    const saveBuildingName = () => {
      localStorage.setItem(`${STORAGE_KEYS.BUILDINGS}_${currentYearMonth}`, currentBuilding);
    };
    
    // 대시보드 업데이트
    const updateDashboard = () => {
      const vacantUnits = unitsData.filter(u => u.isVacant === true);
      const vacancyRate = unitsData.length > 0 ? Math.round((vacantUnits.length / unitsData.length) * 100) : 0;
      document.getElementById('vacancyRate').innerHTML = `${vacancyRate}%`;
      
      const unpaidUnits = unitsData.filter(u => !u.isVacant && !u.isPaid);
      document.getElementById('unpaidCount').innerHTML = `${unpaidUnits.length}건`;
      
      const today = new Date();
      const endOfNextMonth = new Date(today.getFullYear(), today.getMonth() + 2, 0);
      const expiringUnits = unitsData.filter(u => {
        if (u.isVacant || !u.contractEnd) return false;
        const endDate = new Date(u.contractEnd);
        return endDate <= endOfNextMonth && endDate >= today;
      });
      document.getElementById('expiringCount').innerHTML = `${expiringUnits.length}건`;
      
      const requestsCount = unitsData.reduce((sum, u) => sum + (u.requests?.length || 0), 0);
      document.getElementById('requestCount').innerHTML = `${requestsCount}건`;
      
      const totalRent = unitsData.filter(u => !u.isVacant && u.isPaid).reduce((sum, u) => sum + (u.rent || 0), 0);
      document.getElementById('monthlyIncome').innerHTML = `₩ ${totalRent.toLocaleString()}`;
      
      const unpaidListDiv = document.getElementById('unpaidList');
      if (unpaidUnits.length === 0) {
        unpaidListDiv.innerHTML = '<div class="list-item" style="color:#94a3b8;">✨ 모든 세대가 납부 완료!</div>';
      } else {
        unpaidListDiv.innerHTML = unpaidUnits.map(u => `
          <div class="list-item">
            <span class="unit-number">${u.number}호 ${u.tenant || '미기입'}</span>
            <span class="status-badge status-delayed">미납</span>
          </div>
        `).join('');
      }
      
      const expiringListDiv = document.getElementById('expiringList');
      if (expiringUnits.length === 0) {
        expiringListDiv.innerHTML = '<div class="list-item" style="color:#94a3b8;">📋 만기 예정 계약이 없습니다</div>';
      } else {
        expiringListDiv.innerHTML = expiringUnits.map(u => {
          const endDate = new Date(u.contractEnd);
          const daysLeft = Math.ceil((endDate - new Date()) / (1000 * 60 * 60 * 24));
          return `
            <div class="list-item">
              <span class="unit-number">${u.number}호 ${u.tenant || '미기입'}</span>
              <span class="status-badge status-expiring">D-${daysLeft}</span>
            </div>
          `;
        }).join('');
      }
    };
    
    // 세대 폼 초기화
    const resetUnitForm = () => {
      editingUnitId = null;
      document.getElementById('unitFormTitle').innerText = '➕ 세대 정보 입력';
      document.getElementById('unitNumber').value = '';
      document.getElementById('tenantName').value = '';
      document.getElementById('phoneNumber').value = '';
      document.getElementById('rentAmount').value = '500000';
      document.getElementById('depositAmount').value = '5000000';
      document.getElementById('contractStart').value = '';
      document.getElementById('contractEnd').value = '';
      document.querySelector('input[name="status"][value="vacant"]').checked = true;
      document.getElementById('paymentGroup').style.display = 'none';
      document.getElementById('moveInDate').value = '';
      document.getElementById('moveOutDate').value = '';
    };
    
    // 세대 저장
    const saveUnit = () => {
      const unitNumber = document.getElementById('unitNumber').value;
      if (!unitNumber) {
        alert('호수를 선택해주세요!');
        return;
      }
      
      const tenantName = document.getElementById('tenantName').value;
      const phoneNumber = document.getElementById('phoneNumber').value;
      const rentAmount = parseInt(document.getElementById('rentAmount').value) || 0;
      const depositAmount = parseInt(document.getElementById('depositAmount').value) || 0;
      const contractStart = document.getElementById('contractStart').value;
      const contractEnd = document.getElementById('contractEnd').value;
      const status = document.querySelector('input[name="status"]:checked').value;
      const isVacant = status === 'vacant';
      const isPaid = !isVacant && document.querySelector('input[name="payment"]:checked')?.value === 'paid';
      const moveInDate = document.getElementById('moveInDate').value || null;
      const moveOutDate = document.getElementById('moveOutDate').value || null;
      
      let unit = unitsData.find(u => u.id === unitNumber);
      
      if (unit) {
        // 기존 세대 업데이트
        unit.tenant = tenantName;
        unit.phone = phoneNumber;
        unit.rent = rentAmount;
        unit.deposit = depositAmount;
        unit.contractStart = contractStart;
        unit.contractEnd = contractEnd;
        unit.isVacant = isVacant;
        unit.isPaid = isPaid;
        unit.moveInDate = moveInDate;
        unit.moveOutDate = moveOutDate;
      } else {
        // 새 세대 추가 (없는 경우)
        unit = {
          id: unitNumber,
          number: unitNumber,
          tenant: tenantName,
          phone: phoneNumber,
          rent: rentAmount,
          deposit: depositAmount,
          contractStart: contractStart,
          contractEnd: contractEnd,
          isVacant: isVacant,
          isPaid: isPaid,
          requests: [],
          moveInDate: moveInDate,
          moveOutDate: moveOutDate
        };
        unitsData.push(unit);
      }
      
      saveUnitsData();
      updateDashboard();
      closeUnitFormModal();
      alert('저장되었습니다!');
    };
    
    // 세대 수정 폼 열기
    const openEditUnitForm = (unitId) => {
      const unit = unitsData.find(u => u.id === unitId);
      if (!unit) return;
      
      editingUnitId = unitId;
      document.getElementById('unitFormTitle').innerText = '✏️ 세대 정보 수정';
      document.getElementById('unitNumber').value = unit.number;
      document.getElementById('unitNumber').disabled = true;
      document.getElementById('tenantName').value = unit.tenant;
      document.getElementById('phoneNumber').value = unit.phone;
      document.getElementById('rentAmount').value = unit.rent;
      document.getElementById('depositAmount').value = unit.deposit;
      document.getElementById('contractStart').value = unit.contractStart;
      document.getElementById('contractEnd').value = unit.contractEnd;
      document.querySelector(`input[name="status"][value="${unit.isVacant ? 'vacant' : 'occupied'}"]`).checked = true;
      
      if (!unit.isVacant) {
        document.getElementById('paymentGroup').style.display = 'block';
        document.querySelector(`input[name="payment"][value="${unit.isPaid ? 'paid' : 'unpaid'}"]`).checked = true;
      } else {
        document.getElementById('paymentGroup').style.display = 'none';
      }
      
      document.getElementById('moveInDate').value = unit.moveInDate || '';
      document.getElementById('moveOutDate').value = unit.moveOutDate || '';
      
      document.getElementById('unitFormModal').classList.add('active');
    };
    
    // 세대 삭제
    const deleteUnit = (unitId) => {
      if (confirm('정말 삭제하시겠습니까?')) {
        const index = unitsData.findIndex(u => u.id === unitId);
        if (index !== -1) {
          unitsData.splice(index, 1);
          saveUnitsData();
          updateDashboard();
          showUnitList();
        }
      }
    };
    
    // 세대 목록 보여주기
    const showUnitList = () => {
      const container = document.getElementById('unitListContainer');
      container.innerHTML = unitsData.map(unit => `
        <div class="unit-list-item">
          <div class="unit-list-header">
            <span class="unit-number-badge">🏠 ${unit.number}호</span>
            <span class="unit-status ${unit.isVacant ? 'status-vacant' : 'status-occupied'}">
              ${unit.isVacant ? '🔴 공실' : '🟢 임대중'}
            </span>
          </div>
          <div class="unit-info">
            <div class="unit-info-item"><strong>임차인</strong><br>${unit.tenant || '-'}</div>
            <div class="unit-info-item"><strong>연락처</strong><br>${unit.phone || '-'}</div>
            <div class="unit-info-item"><strong>월세</strong><br>${unit.rent.toLocaleString()}원</div>
            <div class="unit-info-item"><strong>보증금</strong><br>${unit.deposit.toLocaleString()}원</div>
            <div class="unit-info-item"><strong>계약기간</strong><br>${unit.contractStart || '-'} ~ ${unit.contractEnd || '-'}</div>
            <div class="unit-info-item"><strong>납부상태</strong><br>${!unit.isVacant && !unit.isPaid ? '❌ 미납' : '✅ 완료'}</div>
          </div>
          <div class="unit-actions">
            <button class="btn-secondary" onclick="window.editUnit('${unit.id}')">수정</button>
            <button class="btn-danger" onclick="window.deleteUnit('${unit.id}')">삭제</button>
          </div>
        </div>
      `).join('');
      
      document.getElementById('unitListModal').classList.add('active');
    };
    
    // 폼 닫기
    const closeUnitFormModal = () => {
      document.getElementById('unitNumber').disabled = false;
      resetUnitForm();
      document.getElementById('unitFormModal').classList.remove('active');
    };
    
    // 상태 변경 시 납부 그룹 표시/숨김
    document.querySelectorAll('input[name="status"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        const paymentGroup = document.getElementById('paymentGroup');
        if (e.target.value === 'occupied') {
          paymentGroup.style.display = 'block';
        } else {
          paymentGroup.style.display = 'none';
        }
      });
    });
    
    // 건물명 저장
    document.getElementById('buildingName').addEventListener('change', (e) => {
      currentBuilding = e.target.value;
      saveBuildingName();
      loadData();
      updateDashboard();
    });
    
    // 메모 모달
    const memoModal = document.getElementById('memoModal');
    const memoText = document.getElementById('memoText');
    
    document.getElementById('memoBtn').addEventListener('click', () => {
      const savedMemo = localStorage.getItem(`${STORAGE_KEYS.MEMO}_${currentBuilding}_${currentYearMonth}`);
      memoText.value = savedMemo || '';
      memoModal.classList.add('active');
    });
    
    document.getElementById('saveMemoBtn').addEventListener('click', () => {
      localStorage.setItem(`${STORAGE_KEYS.MEMO}_${currentBuilding}_${currentYearMonth}`, memoText.value);
      memoModal.classList.remove('active');
      alert('메모가 저장되었습니다!');
    });
    
    document.getElementById('closeMemoBtn').addEventListener('click', () => {
      memoModal.classList.remove('active');
    });
    
    // FAB 버튼 - 세대 입력 폼 열기
    document.getElementById('fabBtn').addEventListener('click', () => {
      resetUnitForm();
      document.getElementById('unitFormModal').classList.add('active');
    });
    
    // 세대 폼 저장 버튼
    document.getElementById('saveUnitBtn').addEventListener('click', saveUnit);
    document.getElementById('closeUnitFormBtn').addEventListener('click', closeUnitFormModal);
    document.getElementById('closeUnitListBtn').addEventListener('click', () => {
      document.getElementById('unitListModal').classList.remove('active');
    });
    
    // 전역 함수 등록
    window.editUnit = openEditUnitForm;
    window.deleteUnit = deleteUnit;
    
    // 탭 전환
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        const tab = item.dataset.tab;
        currentTab = tab;
        navItems.forEach(nav => nav.classList.remove('active'));
        item.classList.add('active');
        
        if (tab === 'units') {
          showUnitList();
        } else if (tab === 'calendar') {
          showCalendar();
        } else if (tab === 'settings') {
          showSettings();
        } else {
          document.querySelectorAll('.cards, .income-card, .section').forEach(el => {
            if (el.parentElement === document.getElementById('app')) {
              el.style.display = '';
            }
          });
          document.getElementById('fabBtn').style.display = 'flex';
          updateDashboard();
        }
      });
    });
    
    // 캘린더 표시
    const showCalendar = () => {
      document.querySelectorAll('.cards, .income-card, .section').forEach(el => {
        if (el.parentElement === document.getElementById('app')) {
          el.style.display = 'none';
        }
      });
      document.getElementById('fabBtn').style.display = 'none';
      
      let calendarDiv = document.getElementById('calendarView');
      if (!calendarDiv) {
        calendarDiv = document.createElement('div');
        calendarDiv.id = 'calendarView';
        document.getElementById('app').appendChild(calendarDiv);
      }
      calendarDiv.style.display = 'block';
      
      const moveEvents = unitsData.filter(u => u.moveInDate || u.moveOutDate);
      calendarDiv.innerHTML = `
        <h3 style="margin-bottom:16px;">📅 입주/퇴실 일정</h3>
        <div style="background:#f8fafc; border-radius:16px; padding:16px;">
          ${moveEvents.length === 0 ? '<div>등록된 일정이 없습니다</div>' : moveEvents.map(u => `
            <div style="padding:12px 0; border-bottom:1px solid #e2e8f0;">
              <strong>${u.number}호</strong>
              ${u.moveInDate ? `<div>🏠 입주: ${u.moveInDate}</div>` : ''}
              ${u.moveOutDate ? `<div>🚪 퇴실: ${u.moveOutDate}</div>` : ''}
            </div>
          `).join('')}
        </div>
        <button id="backToHome" style="margin-top:20px; width:100%; padding:12px; background:#2563eb; color:white; border:none; border-radius:12px;">홈으로 돌아가기</button>
      `;
      
      document.getElementById('backToHome')?.addEventListener('click', () => {
        document.querySelector('.nav-item[data-tab="home"]').click();
      });
    };
    
    // 설정 화면
    const showSettings = () => {
      const password = prompt('관리자 비밀번호를 입력하세요 (기본: 0000)');
      if (password !== '0000') {
        alert('접근 권한이 없습니다.');
        document.querySelector('.nav-item[data-tab="home"]').click();
        return;
      }
      
      document.querySelectorAll('.cards, .income-card, .section').forEach(el => {
        if (el.parentElement === document.getElementById('app')) {
          el.style.display = 'none';
        }
      });
      document.getElementById('fabBtn').style.display = 'none';
      
      let settingsDiv = document.getElementById('settingsView');
      if (!settingsDiv) {
        settingsDiv = document.createElement('div');
        settingsDiv.id = 'settingsView';
        document.getElementById('app').appendChild(settingsDiv);
      }
      settingsDiv.style.display = 'block';
      settingsDiv.innerHTML = `
        <h3 style="margin-bottom:16px;">⚙️ 관리자 설정</h3>
        <button id="resetDataBtn" style="width:100%; padding:12px; background:#ef4444; color:white; border:none; border-radius:12px; margin-bottom:12px;">모든 데이터 초기화</button>
        <button id="exportDataBtn" style="width:100%; padding:12px; background:#10b981; color:white; border:none; border-radius:12px; margin-bottom:12px;">데이터 내보내기</button>
        <button id="backHomeBtn" style="width:100%; padding:12px; background:#64748b; color:white; border:none; border-radius:12px;">홈으로</button>
      `;
      
      document.getElementById('resetDataBtn')?.addEventListener('click', () => {
        if (confirm('모든 데이터를 초기화하시겠습니까? 복구할 수 없습니다.')) {
          localStorage.clear();
          unitsData = generateDefaultUnits();
          saveUnitsData();
          alert('초기화 완료!');
          location.reload();
        }
      });
      
      document.getElementById('exportDataBtn')?.addEventListener('click', () => {
        const data = {
          building: currentBuilding,
          units: unitsData,
          memos: localStorage.getItem(`${STORAGE_KEYS.MEMO}_${currentBuilding}_${currentYearMonth}`)
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `building_data_${currentBuilding}.json`;
        a.click();
        URL.revokeObjectURL(url);
      });
      
      document.getElementById('backHomeBtn')?.addEventListener('click', () => {
        document.querySelector('.nav-item[data-tab="home"]').click();
      });
    };
    
    // 초기화
    initMonthPicker();
    loadData();
    updateDashboard();
    
    // 모달 배경 클릭시 닫기
    window.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal')) {
        e.target.classList.remove('active');
      }
    });
  </script>
</body>
</html>
