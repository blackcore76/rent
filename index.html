<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="manifest.json" />
  <title>월세 관리 - 빌리지</title>
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    
    body {
      background: #f4f7fb;
      color: #1f2937;
      display: flex;
      justify-content: center;
      padding: 16px;
      min-height: 100vh;
    }
    
    /* 모바일 컨테이너 */
    .phone {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 32px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      position: relative;
      min-height: 700px;
      display: flex;
      flex-direction: column;
    }
    
    /* 헤더 */
    .header {
      margin-bottom: 24px;
    }
    
    .building-input-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .building-icon {
      font-size: 24px;
    }
    
    .building-name {
      font-size: 22px;
      font-weight: 800;
      background: none;
      border: none;
      padding: 4px 0;
      color: #1f2937;
      width: auto;
      min-width: 120px;
      cursor: pointer;
      border-bottom: 2px dashed #cbd5e1;
    }
    
    .building-name:focus {
      outline: none;
      border-bottom-color: #2563eb;
    }
    
    /* 한 줄에 월별 선택 + 메모 버튼 */
    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    
    .month-picker {
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: auto;
    }
    
    .memo-btn {
      background: #f1f5f9;
      border: none;
      padding: 10px 18px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    
    /* 카드 그리드 */
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .card {
      background: #f8fafc;
      border-radius: 20px;
      padding: 16px;
    }
    
    .card small {
      color: #64748b;
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
    }
    
    .card strong {
      font-size: 28px;
      font-weight: 800;
    }
    
    .danger { color: #dc2626; }
    .warning { color: #d97706; }
    
    /* 수입 카드 */
    .income-card {
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: white;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .income-card p {
      opacity: 0.9;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    .income-card strong {
      font-size: 32px;
      font-weight: 800;
    }
    
    /* 섹션 */
    .section {
      margin-bottom: 24px;
    }
    
    .section h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #334155;
    }
    
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-delayed {
      background: #fee2e2;
      color: #dc2626;
    }
    
    .status-expiring {
      background: #fffbeb;
      color: #d97706;
    }
    
    /* 하단 네비게이션 */
    .nav {
      display: flex;
      justify-content: space-around;
      padding: 12px 0 8px;
      margin-top: auto;
      border-top: 1px solid #f1f5f9;
      background: white;
    }
    
    .nav-item {
      text-align: center;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 24px;
      transition: all 0.2s;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
    }
    
    .nav-item.active {
      background: #eff6ff;
      color: #2563eb;
    }
    
    /* FAB 버튼 */
    .fab {
      position: fixed;
      bottom: 24px;
      right: calc(50% - 180px);
      width: 56px;
      height: 56px;
      border-radius: 28px;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 28px;
      font-weight: 300;
      box-shadow: 0 8px 20px rgba(37,99,235,0.4);
      cursor: pointer;
      z-index: 1000;
    }
    
    /* 모달 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: white;
      border-radius: 28px;
      max-width: 400px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 24px;
    }
    
    /* 폼 스타일 */
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 6px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .form-row-30-70 {
      display: grid;
      grid-template-columns: 30% 70%;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .form-group input, 
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .form-group input:focus, 
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    
    .radio-group {
      display: flex;
      gap: 16px;
      margin-top: 8px;
    }
    
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: normal;
      cursor: pointer;
    }
    
    .modal-buttons {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    
    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    
    .btn-secondary {
      background: #f1f5f9;
      color: #334155;
    }
    
    .btn-danger {
      background: #fee2e2;
      color: #dc2626;
    }
    
    /* 사진 업로드 영역 */
    .photo-upload-area {
      border: 2px dashed #cbd5e1;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }
    
    .photo-upload-area:hover {
      border-color: #2563eb;
      background: #f8fafc;
    }
    
    .photo-preview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 80px));
      gap: 12px;
      margin-top: 12px;
    }
    
    .photo-item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #f1f5f9;
      aspect-ratio: 1;
    }
    
    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .photo-delete {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* 세대 목록 스타일 */
    .unit-list-item {
      background: #f8fafc;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }
    
    .unit-list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .unit-number-badge {
      font-size: 18px;
      font-weight: 800;
    }
    
    .unit-status {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-vacant {
      background: #e2e8f0;
      color: #64748b;
    }
    
    .status-occupied {
      background: #dcfce7;
      color: #16a34a;
    }
    
    .unit-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    
    .unit-actions {
      display: flex;
      gap: 8px;
    }
    
    .unit-actions button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    
    @media (max-width: 480px) {
      .phone { padding: 16px; }
      .fab { right: 20px; bottom: 20px; }
    }
  </style>
</head>
<body>
  <div class="phone" id="app">
    <div class="header">
      <div class="building-input-wrapper">
        <span class="building-icon">🏣</span>
        <input type="text" id="buildingName" class="building-name" value="조아빌" maxlength="20">
      </div>
      <div class="top-controls">
        <select id="monthPicker" class="month-picker"></select>
        <button class="memo-btn" id="memoBtn">📝 메모</button>
      </div>
    </div>
    
    <div class="cards">
      <div class="card"><small>❎ 공실현황</small><strong id="vacancyRate">0%</strong></div>
      <div class="card"><small>😨 미납현황</small><strong id="unpaidCount" class="danger">0건</strong></div>
      <div class="card"><small>🔜 만기예정</small><strong id="expiringCount" class="warning">0건</strong></div>
      <div class="card"><small>🛠️ 요청사항</small><strong id="requestCount">0건</strong></div>
    </div>
    
    <div class="income-card">
      <p>💰 이번달 수입</p>
      <strong id="monthlyIncome">₩ 0</strong>
    </div>
    
    <div class="section">
      <h3>😨 미납 세대</h3>
      <div id="unpaidList"></div>
    </div>
    
    <div class="section">
      <h3>🔜 만기 예정</h3>
      <div id="expiringList"></div>
    </div>
    
    <div class="nav">
      <div class="nav-item active" data-tab="home">🏠 홈</div>
      <div class="nav-item" data-tab="units">🏢 세대</div>
      <div class="nav-item" data-tab="calendar">📅 일정</div>
      <div class="nav-item" data-tab="settings">⚙️ 설정</div>
    </div>
  </div>
  
  <button class="fab" id="fabBtn">+</button>
  
  <!-- 메모 모달 -->
  <div id="memoModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-bottom: 16px;">📝 메모 작성</h3>
      <textarea id="memoText" rows="6" style="width:100%; padding:12px; border-radius:12px; border:1px solid #e2e8f0; font-size:14px;"></textarea>
      <div class="modal-buttons">
        <button id="saveMemoBtn" class="btn-primary">저장</button>
        <button id="closeMemoBtn" class="btn-secondary">닫기</button>
      </div>
    </div>
  </div>
  
  <!-- 세대 입력/수정 모달 -->
  <div id="unitFormModal" class="modal">
    <div class="modal-content">
      <h3 id="unitFormTitle" style="margin-bottom: 20px;">➕ 세대 정보 입력</h3>
      
      <!-- 호수 + 임차인 (30% 70%) -->
      <div class="form-row-30-70">
        <div class="form-group">
          <label>호수 *</label>
          <select id="unitNumber">
            <option value="">선택</option>
            <option value="201">201호</option><option value="202">202호</option>
            <option value="203">203호</option><option value="204">204호</option>
            <option value="205">205호</option><option value="206">206호</option>
            <option value="301">301호</option><option value="302">302호</option>
            <option value="303">303호</option><option value="304">304호</option>
            <option value="305">305호</option><option value="306">306호</option>
            <option value="401">401호</option><option value="402">402호</option>
            <option value="403">403호</option><option value="404">404호</option>
            <option value="405">405호</option><option value="406">406호</option>
          </select>
        </div>
        <div class="form-group">
          <label>임차인 이름</label>
          <input type="text" id="tenantName" placeholder="이름">
        </div>
      </div>
      
      <!-- 연락처 2개 (50% 50%) -->
      <div class="form-row">
        <div class="form-group">
          <label>연락처 1</label>
          <input type="tel" id="phone1" placeholder="010-0000-0000">
        </div>
        <div class="form-group">
          <label>연락처 2</label>
          <input type="tel" id="phone2" placeholder="010-0000-0000 (선택)">
        </div>
      </div>
      
      <!-- 보증금 + 월세 (50% 50%) -->
      <div class="form-row">
        <div class="form-group">
          <label>보증금 (원)</label>
          <input type="number" id="depositAmount" placeholder="5,000,000" value="5000000">
        </div>
        <div class="form-group">
          <label>월세 (원)</label>
          <input type="number" id="rentAmount" placeholder="500,000" value="500000">
        </div>
      </div>
      
      <!-- 계약 기간 -->
      <div class="form-row">
        <div class="form-group">
          <label>계약 시작일</label>
          <input type="date" id="contractStart">
        </div>
        <div class="form-group">
          <label>계약 종료일</label>
          <input type="date" id="contractEnd">
        </div>
      </div>
      
      <!-- 입주/퇴실 예정일 -->
      <div class="form-row">
        <div class="form-group">
          <label>입주 예정일</label>
          <input type="date" id="moveInDate">
        </div>
        <div class="form-group">
          <label>퇴실 예정일</label>
          <input type="date" id="moveOutDate">
        </div>
      </div>
      
      <!-- 메모란 -->
      <div class="form-group">
        <label>📋 메모</label>
        <textarea id="unitMemo" rows="3" placeholder="특이사항, 요청사항 등을 입력하세요..." style="resize: none;"></textarea>
      </div>
      
      <!-- 상태 선택 -->
      <div class="form-group">
        <label>상태</label>
        <div class="radio-group">
          <label><input type="radio" name="status" value="vacant" checked> 공실</label>
          <label><input type="radio" name="status" value="occupied"> 임대중</label>
        </div>
      </div>
      
      <div id="paymentGroup" style="display: none;">
        <div class="form-group">
          <label>월세 납부 상태</label>
          <div class="radio-group">
            <label><input type="radio" name="payment" value="paid" checked> 납부 완료</label>
            <label><input type="radio" name="payment" value="unpaid"> 미납</label>
          </div>
        </div>
      </div>
      
      <!-- 계약서 사진 업로드 -->
      <div class="form-group">
        <label>📎 계약서 사진</label>
        <div id="photoUploadArea" class="photo-upload-area">
          📸 사진을 선택하세요<br>
          <small style="color:#94a3b8;">클릭하여 사진 업로드</small>
        </div>
        <input type="file" id="photoInput" accept="image/*" multiple style="display: none;">
        <div id="photoPreview" class="photo-preview"></div>
      </div>
      
      <div class="modal-buttons">
        <button id="saveUnitBtn" class="btn-primary">저장</button>
        <button id="closeUnitFormBtn" class="btn-secondary">닫기</button>
      </div>
    </div>
  </div>
  
  <!-- 세대 목록 모달 -->
  <div id="unitListModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-bottom: 20px;">🏢 세대 목록</h3>
      <div id="unitListContainer" style="max-height: 500px; overflow-y: auto;"></div>
      <button id="closeUnitListBtn" class="btn-secondary" style="margin-top: 16px; width: 100%;">닫기</button>
    </div>
  </div>

  <script type="module">
    // 로컬 스토리지 키
    const STORAGE_KEYS = {
      BUILDINGS: 'building_data',
      UNITS: 'units_data',
      MEMO: 'memo_data'
    };
    
    // 기본 세대 데이터
    const generateDefaultUnits = () => {
      const units = [];
      const floors = [2, 3, 4];
      const numbers = [1, 2, 3, 4, 5, 6];
      floors.forEach(floor => {
        numbers.forEach(num => {
          const unitNum = `${floor}0${num}`;
          units.push({
            id: unitNum,
            number: unitNum,
            tenant: '',
            phone1: '',
            phone2: '',
            rent: 500000,
            deposit: 5000000,
            contractStart: '',
            contractEnd: '',
            isVacant: true,
            isPaid: true,
            requests: [],
            moveInDate: null,
            moveOutDate: null,
            memo: '',
            photos: [] // base64 이미지 배열
          });
        });
      });
      return units;
    };
    
    // 상태 관리
    let currentBuilding = '조아빌';
    let currentYearMonth = '2026-04';
    let unitsData = [];
    let currentTab = 'home';
    let editingUnitId = null;
    let tempPhotos = []; // 임시 이미지 파일들
    
    // 월 선택기 초기화
    const initMonthPicker = () => {
      const picker = document.getElementById('monthPicker');
      const months = [];
      const today = new Date();
      for (let i = -5; i <= 5; i++) {
        const date = new Date(today.getFullYear(), today.getMonth() + i, 1);
        const yearMonth = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        const display = `${date.getFullYear()}년 ${date.getMonth() + 1}월`;
        months.push({ value: yearMonth, label: display });
      }
      picker.innerHTML = months.map(m => `<option value="${m.value}" ${m.value === currentYearMonth ? 'selected' : ''}>${m.label}</option>`);
      picker.addEventListener('change', (e) => {
        currentYearMonth = e.target.value;
        loadData();
        updateDashboard();
      });
    };
    
    // 데이터 로드
    const loadData = () => {
      const savedBuilding = localStorage.getItem(`${STORAGE_KEYS.BUILDINGS}_${currentYearMonth}`);
      if (savedBuilding) {
        currentBuilding = savedBuilding;
        document.getElementById('buildingName').value = currentBuilding;
      }
      
      const savedUnits = localStorage.getItem(`${STORAGE_KEYS.UNITS}_${currentBuilding}`);
      if (savedUnits) {
        unitsData = JSON.parse(savedUnits);
      } else {
        unitsData = generateDefaultUnits();
        saveUnitsData();
      }
    };
    
    const saveUnitsData = () => {
      localStorage.setItem(`${STORAGE_KEYS.UNITS}_${currentBuilding}`, JSON.stringify(unitsData));
    };
    
    // 사진을 base64로 변환
    const fileToBase64 = (file) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    };
    
    // 사진 미리보기 업데이트
    const updatePhotoPreview = () => {
      const previewDiv = document.getElementById('photoPreview');
      previewDiv.innerHTML = tempPhotos.map((photo, index) => `
        <div class="photo-item">
          <img src="${photo}" alt="계약서">
          <button class="photo-delete" data-index="${index}">×</button>
        </div>
      `).join('');
      
      // 삭제 버튼 이벤트
      document.querySelectorAll('.photo-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const index = parseInt(btn.dataset.index);
          tempPhotos.splice(index, 1);
          updatePhotoPreview();
        });
      });
    };
    
    // 사진 업로드 처리
    const setupPhotoUpload = () => {
      const uploadArea = document.getElementById('photoUploadArea');
      const photoInput = document.getElementById('photoInput');
      
      uploadArea.addEventListener('click', () => {
        photoInput.click();
      });
      
      photoInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        for (const file of files) {
          if (file.type.startsWith('image/')) {
            const base64 = await fileToBase64(file);
            tempPhotos.push(base64);
          }
        }
        updatePhotoPreview();
        photoInput.value = '';
      });
    };
    
    // 세대 폼 초기화
    const resetUnitForm = () => {
      editingUnitId = null;
      tempPhotos = [];
      document.getElementById('unitFormTitle').innerText = '➕ 세대 정보 입력';
      document.getElementById('unitNumber').value = '';
      document.getElementById('unitNumber').disabled = false;
      document.getElementById('tenantName').value = '';
      document.getElementById('phone1').value = '';
      document.getElementById('phone2').value = '';
      document.getElementById('depositAmount').value = '5000000';
      document.getElementById('rentAmount').value = '500000';
      document.getElementById('contractStart').value = '';
      document.getElementById('contractEnd').value = '';
      document.getElementById('moveInDate').value = '';
      document.getElementById('moveOutDate').value = '';
      document.getElementById('unitMemo').value = '';
      document.querySelector('input[name="status"][value="vacant"]').checked = true;
      document.getElementById('paymentGroup').style.display = 'none';
      document.getElementById('photoPreview').innerHTML = '';
    };
    
    // 세대 저장
    const saveUnit = () => {
      const unitNumber = document.getElementById('unitNumber').value;
      if (!unitNumber) {
        alert('호수를 선택해주세요!');
        return;
      }
      
      const unitData = {
        id: unitNumber,
        number: unitNumber,
        tenant: document.getElementById('tenantName').value,
        phone1: document.getElementById('phone1').value,
        phone2: document.getElementById('phone2').value,
        deposit: parseInt(document.getElementById('depositAmount').value) || 0,
        rent: parseInt(document.getElementById('rentAmount').value) || 0,
        contractStart: document.getElementById('contractStart').value,
        contractEnd: document.getElementById('contractEnd').value,
        moveInDate: document.getElementById('moveInDate').value || null,
        moveOutDate: document.getElementById('moveOutDate').value || null,
        memo: document.getElementById('unitMemo').value,
        isVacant: document.querySelector('input[name="status"]:checked').value === 'vacant',
        isPaid: !unitData.isVacant && document.querySelector('input[name="payment"]:checked')?.value === 'paid',
        photos: tempPhotos,
        requests: []
      };
      
      const existingIndex = unitsData.findIndex(u => u.id === unitNumber);
      if (existingIndex !== -1) {
        unitsData[existingIndex] = { ...unitsData[existingIndex], ...unitData };
      } else {
        unitsData.push(unitData);
      }
      
      saveUnitsData();
      updateDashboard();
      closeUnitFormModal();
      alert('저장되었습니다!');
    };
    
    // 세대 수정 폼 열기
    const openEditUnitForm = (unitId) => {
      const unit = unitsData.find(u => u.id === unitId);
      if (!unit) return;
      
      editingUnitId = unitId;
      tempPhotos = [...(unit.photos || [])];
      document.getElementById('unitFormTitle').innerText = '✏️ 세대 정보 수정';
      document.getElementById('unitNumber').value = unit.number;
      document.getElementById('unitNumber').disabled = true;
      document.getElementById('tenantName').value = unit.tenant || '';
      document.getElementById('phone1').value = unit.phone1 || '';
      document.getElementById('phone2').value = unit.phone2 || '';
      document.getElementById('depositAmount').value = unit.deposit;
      document.getElementById('rentAmount').value = unit.rent;
      document.getElementById('contractStart').value = unit.contractStart || '';
      document.getElementById('contractEnd').value = unit.contractEnd || '';
      document.getElementById('moveInDate').value = unit.moveInDate || '';
      document.getElementById('moveOutDate').value = unit.moveOutDate || '';
      document.getElementById('unitMemo').value = unit.memo || '';
      document.querySelector(`input[name="status"][value="${unit.isVacant ? 'vacant' : 'occupied'}"]`).checked = true;
      
      if (!unit.isVacant) {
        document.getElementById('paymentGroup').style.display = 'block';
        document.querySelector(`input[name="payment"][value="${unit.isPaid ? 'paid' : 'unpaid'}"]`).checked = true;
      }
      
      updatePhotoPreview();
      document.getElementById('unitFormModal').classList.add('active');
    };
    
    // 세대 삭제
    const deleteUnit = (unitId) => {
      if (confirm('정말 삭제하시겠습니까?')) {
        const index = unitsData.findIndex(u => u.id === unitId);
        if (index !== -1) {
          unitsData.splice(index, 1);
          saveUnitsData();
          updateDashboard();
          showUnitList();
        }
      }
    };
    
    // 세대 목록 보여주기
    const showUnitList = () => {
      const container = document.getElementById('unitListContainer');
      container.innerHTML = unitsData.map(unit => `
        <div class="unit-list-item">
          <div class="unit-list-header">
            <span class="unit-number-badge">🏠 ${unit.number}호</span>
            <span class="unit-status ${unit.isVacant ? 'status-vacant' : 'status-occupied'}">
              ${unit.isVacant ? '🔴 공실' : '🟢 임대중'}
            </span>
          </div>
          <div class="unit-info">
            <div><strong>임차인</strong><br>${unit.tenant || '-'}</div>
            <div><strong>연락처</strong><br>${unit.phone1 || '-'}${unit.phone2 ? `<br>${unit.phone2}` : ''}</div>
            <div><strong>월세/보증금</strong><br>${unit.rent.toLocaleString()} / ${unit.deposit.toLocaleString()}</div>
            <div><strong>계약기간</strong><br>${unit.contractStart || '-'} ~ ${unit.contractEnd || '-'}</div>
          </div>
          ${unit.memo ? `<div style="font-size:12px; color:#64748b; margin-bottom:12px;">📝 ${unit.memo}</div>` : ''}
          ${unit.photos?.length ? `<div style="font-size:12px; color:#2563eb;">📎 계약서 ${unit.photos.length}장</div>` : ''}
          <div class="unit-actions">
            <button class="btn-secondary" onclick="window.editUnit('${unit.id}')">수정</button>
            <button class="btn-danger" onclick="window.deleteUnit('${unit.id}')">삭제</button>
          </div>
        </div>
      `).join('');
      document.getElementById('unitListModal').classList.add('active');
    };
    
    const closeUnitFormModal = () => {
      resetUnitForm();
      document.getElementById('unitFormModal').classList.remove('active');
    };
    
    // 대시보드 업데이트
    const updateDashboard = () => {
      const vacantUnits = unitsData.filter(u => u.isVacant);
      const vacancyRate = unitsData.length ? Math.round((vacantUnits.length / unitsData.length) * 100) : 0;
      document.getElementById('vacancyRate').innerHTML = `${vacancyRate}%`;
      
      const unpaidUnits = unitsData.filter(u => !u.isVacant && !u.isPaid);
      document.getElementById('unpaidCount').innerHTML = `${unpaidUnits.length}건`;
      
      const today = new Date();
      const endOfNextMonth = new Date(today.getFullYear(), today.getMonth() + 2, 0);
      const expiringUnits = unitsData.filter(u => {
        if (u.isVacant || !u.contractEnd) return false;
        const endDate = new Date(u.contractEnd);
        return endDate <= endOfNextMonth && endDate >= today;
      });
      document.getElementById('expiringCount').innerHTML = `${expiringUnits.length}건`;
      
      const requestsCount = unitsData.reduce((sum, u) => sum + (u.requests?.length || 0), 0);
      document.getElementById('requestCount').innerHTML = `${requestsCount}건`;
      
      const totalRent = unitsData.filter(u => !u.isVacant && u.isPaid).reduce((sum, u) => sum + (u.rent || 0), 0);
      document.getElementById('monthlyIncome').innerHTML = `₩ ${totalRent.toLocaleString()}`;
      
      const unpaidListDiv = document.getElementById('unpaidList');
      if (unpaidUnits.length === 0) {
        unpaidListDiv.innerHTML = '<div class="list-item" style="color:#94a3b8;">✨ 모든 세대가 납부 완료!</div>';
      } else {
        unpaidListDiv.innerHTML = unpaidUnits.map(u => `
          <div class="list-item">
            <span>${u.number}호 ${u.tenant || '미기입'}</span>
            <span class="status-badge status-delayed">미납</span>
          </div>
        `).join('');
      }
      
      const expiringListDiv = document.getElementById('expiringList');
      if (expiringUnits.length === 0) {
        expiringListDiv.innerHTML = '<div class="list-item" style="color:#94a3b8;">📋 만기 예정 계약이 없습니다</div>';
      } else {
        expiringListDiv.innerHTML = expiringUnits.map(u => {
          const endDate = new Date(u.contractEnd);
          const daysLeft = Math.ceil((endDate - new Date()) / (1000 * 60 * 60 * 24));
          return `
            <div class="list-item">
              <span>${u.number}호 ${u.tenant || '미기입'}</span>
              <span class="status-badge status-expiring">D-${daysLeft}</span>
            </div>
          `;
        }).join('');
      }
    };
    
    // 상태 변경 시 납부 그룹 표시
    document.querySelectorAll('input[name="status"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        const paymentGroup = document.getElementById('paymentGroup');
        paymentGroup.style.display = e.target.value === 'occupied' ? 'block' : 'none';
      });
    });
    
    // 이벤트 바인딩
    document.getElementById('buildingName').addEventListener('change', (e) => {
      currentBuilding = e.target.value;
      localStorage.setItem(`${STORAGE_KEYS.BUILDINGS}_${currentYearMonth}`, currentBuilding);
      loadData();
      updateDashboard();
    });
    
    // 메모
    document.getElementById('memoBtn').addEventListener('click', () => {
      const savedMemo = localStorage.getItem(`${STORAGE_KEYS.MEMO}_${currentBuilding}_${currentYearMonth}`);
      document.getElementById('memoText').value = savedMemo || '';
      document.getElementById('memoModal').classList.add('active');
    });
    
    document.getElementById('saveMemoBtn').addEventListener('click', () => {
      localStorage.setItem(`${STORAGE_KEYS.MEMO}_${currentBuilding}_${currentYearMonth}`, document.getElementById('memoText').value);
      document.getElementById('memoModal').classList.remove('active');
      alert('메모 저장됨');
    });
    
    document.getElementById('closeMemoBtn').addEventListener('click', () => {
      document.getElementById('memoModal').classList.remove('active');
    });
    
    document.getElementById('fabBtn').addEventListener('click', () => {
      resetUnitForm();
      document.getElementById('unitFormModal').classList.add('active');
    });
    
    document.getElementById('saveUnitBtn').addEventListener('click', saveUnit);
    document.getElementById('closeUnitFormBtn').addEventListener('click', closeUnitFormModal);
    document.getElementById('closeUnitListBtn').addEventListener('click', () => {
      document.getElementById('unitListModal').classList.remove('active');
    });
    
    window.editUnit = openEditUnitForm;
    window.deleteUnit = deleteUnit;
    
    // 탭 전환
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        const tab = item.dataset.tab;
        currentTab = tab;
        navItems.forEach(nav => nav.classList.remove('active'));
        item.classList.add('active');
        
        if (tab === 'units') {
          showUnitList();
        } else if (tab === 'calendar') {
          // 간단 캘린더
          document.querySelectorAll('.cards, .income-card, .section').forEach(el => {
            if (el.parentElement === document.getElementById('app')) el.style.display = 'none';
          });
          document.getElementById('fabBtn').style.display = 'none';
          let calDiv = document.getElementById('calendarView') || (() => {
            const div = document.createElement('div');
            div.id = 'calendarView';
            document.getElementById('app').appendChild(div);
            return div;
          })();
          calDiv.style.display = 'block';
          const events = unitsData.filter(u => u.moveInDate || u.moveOutDate);
          calDiv.innerHTML = `<h3>📅 일정</h3><div>${events.map(u => `<div><strong>${u.number}호</strong> ${u.moveInDate ? `🏠 입주 ${u.moveInDate}` : ''} ${u.moveOutDate ? `🚪 퇴실 ${u.moveOutDate}` : ''}</div>`).join('') || '없음'}</div><button id="backHome" style="margin-top:16px; width:100%; padding:12px; background:#2563eb; color:white; border:none; border-radius:12px;">홈</button>`;
          document.getElementById('backHome')?.addEventListener('click', () => document.querySelector('.nav-item[data-tab="home"]').click());
        } else if (tab === 'settings') {
          const pwd = prompt('관리자 비밀번호 (0000)');
          if (pwd !== '0000') { alert('권한 없음'); document.querySelector('.nav-item[data-tab="home"]').click(); return; }
          document.querySelectorAll('.cards, .income-card, .section').forEach(el => {
            if (el.parentElement === document.getElementById('app')) el.style.display = 'none';
          });
          document.getElementById('fabBtn').style.display = 'none';
          let setDiv = document.getElementById('settingsView') || (() => {
            const div = document.createElement('div');
            div.id = 'settingsView';
            document.getElementById('app').appendChild(div);
            return div;
          })();
          setDiv.style.display = 'block';
          setDiv.innerHTML = `<h3>⚙️ 설정</h3><button id="resetData" style="width:100%; padding:12px; background:#ef4444; color:white; border:none; border-radius:12px; margin-bottom:12px;">초기화</button><button id="exportData" style="width:100%; padding:12px; background:#10b981; color:white; border:none; border-radius:12px;">내보내기</button><button id="backHomeSet" style="margin-top:12px; width:100%; padding:12px; background:#64748b; color:white; border:none; border-radius:12px;">홈</button>`;
          document.getElementById('resetData')?.addEventListener('click', () => { if(confirm('초기화?')){localStorage.clear(); location.reload();} });
          document.getElementById('exportData')?.addEventListener('click', () => { const data = {building:currentBuilding, units:unitsData}; const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(data)])); a.download='data.json'; a.click(); });
          document.getElementById('backHomeSet')?.addEventListener('click', () => document.querySelector('.nav-item[data-tab="home"]').click());
        } else {
          document.querySelectorAll('.cards, .income-card, .section').forEach(el => {
            if (el.parentElement === document.getElementById('app')) el.style.display = '';
          });
          document.getElementById('fabBtn').style.display = 'flex';
          ['calendarView', 'settingsView'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
          });
          updateDashboard();
        }
      });
    });
    
    setupPhotoUpload();
    initMonthPicker();
    loadData();
    updateDashboard();
    
    window.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal')) e.target.classList.remove('active');
    });
  </script>
</body>
</html>
