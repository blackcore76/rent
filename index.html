<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💯 월세 관리</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body {
      background: #f4f7fb;
      color: #1f2937;
      display: flex;
      justify-content: center;
      padding: 24px;
    }
    .phone {
      width: 390px;
      background: #ffffff;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .building { font-size: 20px; font-weight: 700; }
    .month { color: #6b7280; font-size: 14px; }
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .card {
      background: #f8fafc;
      border-radius: 20px;
      padding: 16px;
    }
    .card small { color: #6b7280; display:block; margin-bottom: 8px; }
    .card strong { font-size: 24px; }
    .income {
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      color: white;
      border-radius: 22px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .income p { opacity: 0.9; margin-bottom: 8px; }
    .income strong { font-size: 30px; }
    .section { margin-bottom: 20px; }
    .section h3 { font-size: 16px; margin-bottom: 12px; }
    .list-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #eef2f7;
    }
    .danger { color: #dc2626; font-weight: 600; }
    .warning { color: #d97706; font-weight: 600; }
    .nav {
      display: flex;
      justify-content: space-around;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
      color: #6b7280;
      font-size: 13px;
    }
    .nav .active { color: #2563eb; font-weight: 700; }
    .fab {
      position: fixed;
      bottom: 36px;
      right: calc(50% - 170px);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 28px;
      box-shadow: 0 10px 20px rgba(37,99,235,0.35);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <div>
        <div class="building">🏣 조은빌 ▾</div>
        <div class="month">2026년 4월</div>
      </div>
      <div>🔔</div>
    </div>

    <div class="cards">
      <div class="card"><small>❎ 공실현황</small><strong>25%</strong></div>
      <div class="card"><small>😨 미납현황</small><strong class="danger">2건</strong></div>
      <div class="card"><small>🔜 만기예정</small><strong class="warning">1건</strong></div>
      <div class="card"><small>🛠️ 요청사항</small><strong>202호, 406</strong></div>
    </div>

    <div class="income">
      <p>😊 이번달 수입</p>
      <strong>₩ 2,150,000</strong>
    </div>

    <div class="section">
      <h3>😨 미납 세대</h3>
      <div class="list-item"><span>201호 김OO</span><span class="danger">5일 지연</span></div>
      <div class="list-item"><span>305호 박OO</span><span class="danger">2일 지연</span></div>
    </div>

    <div class="section">
      <h3>🔜 만기 예정</h3>
      <div class="list-item"><span>303호 이OO</span><span class="warning">D-14</span></div>
    </div>

    <div class="nav">
      <div class="active">홈</div>
      <div>세대</div>
      <div>일정</div>
      <div>설정</div>
    </div>
  </div>

  <button class="fab">+</button>
  
</body>
</html>
